<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strike2Give - PvP Bowling</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://grind2give.org/Untitled-design-27.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px 20px;
      position: relative;
    }

    h1 {
      font-size: 5.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-shadow: 0 0 40px rgba(0,255,170,0.8);
    }

    .tagline {
      font-size: 2.6rem;
      font-weight: 700;
      color: #00ffaa;
      margin-bottom: 30px;
      text-shadow: 0 0 30px rgba(0,255,170,0.6);
    }

    .description {
      font-size: 1.55rem;
      max-width: 850px;
      margin: 0 auto 50px;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      padding: 22px 70px;
      font-size: 1.8rem;
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      margin: 15px;
      transition: all 0.4s;
    }

    .btn-primary {
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      color: #000;
    }

    .btn-primary:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(0,255,170,0.8);
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Strike2Give</h1>
    <p class="tagline">Strike2Give… And Get! 🎳</p>
    <p class="description">
      Competitive PvP Bowling • Battle players worldwide<br>
      Earn real $G2G rewards through daily logins and winning matches
    </p>
    
    <div>
      <a href="https://forms.gle/YOUR_FORM_LINK_HERE" target="_blank" class="btn btn-primary">
        Join Waitlist → Early Access
      </a>
      <a href="/how-to-buy.html" class="btn btn-primary">
        Buy $G2G
      </a>
    </div>
  </div>

  <section style="padding:100px 20px; background:#0a0a0a;">
    <h2 style="font-size:3rem; margin-bottom:40px;">Bowl. Compete. Win. Give.</h2>
  </section>

  <footer style="padding:60px; background:#000; color:#666;">
    Strike2Give — Part of the Grind2Give Ecosystem 💚
  </footer>

</body>
</html>
