<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strike2Give Bowling - Phase 3 Fix 54: TEST ONLY Banner Restored (Red Banner Only)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* TEST ONLY BANNER - red banner only, no full-screen overlay */
        #testOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 0, 0, 0.92);
            color: #ffffff;
            text-align: center;
            padding: 8px 0;
            font-family: Arial Black, sans-serif;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            z-index: 1000;
            pointer-events: none;
            text-shadow: 0 0 8px #000;
        }

        #info { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 8px; font-family: Arial; z-index: 100; }
        
        #timer { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            color: #ff0; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px black; 
            background: rgba(0,0,0,0.6); padding: 12px 40px; border-radius: 12px; 
            display: none; z-index: 100; transition: color 0.4s ease; min-width: 80px; text-align: center;
        }
        #timer.pulse { animation: pulse 0.6s infinite; font-size: 48px; }
        @keyframes pulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.25); } }

        #spinMeterContainer { 
            position: absolute; 
            bottom: 50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 380px; 
            height: 26px; 
            background: #222; 
            border: 3px solid #fff; 
            border-radius: 13px; 
            display: block; 
            z-index: 100; 
            overflow: hidden; 
            box-shadow: 0 0 12px rgba(255,255,255,0.3); 
        }
        #spinMeter { position: relative; width: 100%; height: 100%; background: linear-gradient(to right, #ff2222, #ff5555, #3399ff, #66aaff, #44ff88, #66aaff, #3399ff, #ff5555, #ff2222); }
        #spinIndicator { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 22px; height: 22px; background: #ffffff; border: 3px solid #00ccff; border-radius: 50%; box-shadow: 0 0 15px #00ccff; }
        .tick { position: absolute; top: 0; bottom: 0; width: 3px; background: rgba(255,255,255,0.85); box-shadow: 0 0 6px rgba(255,255,255,0.6); }
        #tickHighLeft { left: 11%; } #tickMediumLeft { left: 24%; } #tickLittleLeft { left: 37%; } #tickCenter { left: 50%; }
        #tickLittleRight { left: 63%; } #tickMediumRight { left: 76%; } #tickHighRight { left: 89%; }

        #debug { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.85); color: #0ff; font-family: monospace; font-size: 14px; padding: 10px; border-radius: 6px; z-index: 300; min-width: 260px; pointer-events: none; }
        #foul { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 90px; font-weight: bold; text-shadow: 0 0 25px #000; display: none; z-index: 200; pointer-events: none; font-family: Arial Black, sans-serif; }

        #pinResult {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial Black, sans-serif;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 25px #000, 0 0 40px #00ff88;
            display: none;
            z-index: 250;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #timeUp {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8800;
            font-family: Arial Black, sans-serif;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 25px #000, 0 0 40px #ff8800;
            display: none;
            z-index: 250;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
    </style>
</head>
<body>

    <!-- TEST ONLY BANNER - red only, no full-screen overlay -->
    <div id="testOverlay">TEST ONLY — NOT LIVE OR BETA</div>

    <div id="info">Strike2Give Bowling - Phase 3 Fix 54: TEST ONLY Banner Restored<br>Current Ball: <span id="currentBallName">Basic Hammer</span></div>
    <div id="timer">25</div>

    <div id="spinMeterContainer">
        <div id="spinMeter">
            <div class="tick" id="tickHighLeft"></div>
            <div class="tick" id="tickMediumLeft"></div>
            <div class="tick" id="tickLittleLeft"></div>
            <div class="tick" id="tickCenter"></div>
            <div class="tick" id="tickLittleRight"></div>
            <div class="tick" id="tickMediumRight"></div>
            <div class="tick" id="tickHighRight"></div>
            <div id="spinIndicator"></div>
        </div>
    </div>

    <div id="debug"></div>
    <div id="foul">FOUL!</div>
    <div id="pinResult"></div>
    <div id="timeUp"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        console.log("✅ PHASE 3 FIX 54 – TEST ONLY red banner restored (no full-screen overlay)");

        const laneWidth = 26;
        const gutterChannelWidth = 7;
        const gutterDepth = 8;
        const gutterOffset = 1;
        const COLLECTOR_EXTRA_WIDTH = 15.5;

        // EASY ADJUSTMENT CONSTANTS (CHANGE THESE!)
        const PIN_HEIGHT_SCALE = 1.95;   // taller = higher number
        const PIN_WIDTH_SCALE  = .8;    // wider/thicker = higher number

        let balls = [
            {id:1, name:"Basic Hammer", tier:"basic", primary:"power", power:5, control:3, spin:3, precision:3, bounce:1, color:0x0066ff},
            {id:2, name:"Basic Spare", tier:"basic", primary:"precision", power:3, control:3, spin:3, precision:5, bounce:1, color:0x00cc88},
            {id:3, name:"Basic Curve", tier:"basic", primary:"spin", power:3, control:3, spin:5, precision:1, bounce:3, color:0xff8800},
            {id:4, name:"Basic Bounce", tier:"basic", primary:"bounce", power:1, control:3, spin:3, precision:3, bounce:5, color:0xff00ff},
            {id:9, name:"Epic Thunder", tier:"epic", primary:"power", power:8, control:4, spin:4, precision:4, bounce:3, color:0xff2222},
            {id:10, name:"Epic Sniper", tier:"epic", primary:"precision", power:4, control:4, spin:4, precision:8, bounce:3, color:0x22ff88},
            {id:17, name:"Grinder Crusher", tier:"grinder", primary:"power", power:12, control:6, spin:6, precision:6, bounce:5, color:0x8800ff},
            {id:18, name:"Grinder Razor", tier:"spin", power:6, control:6, spin:12, precision:5, bounce:6, color:0x00ffff},
            {id:29, name:"Hero Titan", tier:"hero", primary:"power", power:15, control:8, spin:8, precision:8, bounce:7, color:0xffff00},
            {id:30, name:"Hero Ghost", tier:"hero", primary:"bounce", power:7, control:8, spin:8, precision:8, bounce:15, color:0x00ffff}
        ];

        let currentBall = balls[0];

        const MIN_PULL_Z = 25.08;
        const MAX_PULL_Z = 40;
        const laneExtension = 85;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xdddddd, 0.9));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
        dirLight.position.set(30, 80, 60);
        scene.add(dirLight);

        const seamZ = 20;
        const foulDetectionZ = 19.30;
        const ballRadiusBase = 1.78;
        const LANE_TOP_Y = 0.5;

        const lighterWood = 0x8B5A2B;
        const darkerWood = 0x6B3E2A;
        const numPlanks = 15;
        const plankWidth = laneWidth / numPlanks;

        for (let i = 0; i < numPlanks; i++) {
            const color = (i % 2 === 0) ? lighterWood : darkerWood;
            const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.2, 300 + laneExtension), new THREE.MeshLambertMaterial({ color }));
            const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
            plank.position.set(x, -2.5, -80 - laneExtension / 2);
            scene.add(plank);
        }

        for (let i = 0; i < numPlanks; i++) {
            const color = (i % 2 === 0) ? lighterWood : darkerWood;
            const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 25), new THREE.MeshLambertMaterial({ color }));
            const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
            plank.position.set(x, -2.45, seamZ + 12.5); scene.add(plank);
        }

        for (let i = 0; i < numPlanks; i++) {
            const color = (i % 2 === 0) ? lighterWood : darkerWood;
            const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 30), new THREE.MeshLambertMaterial({ color }));
            const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
            plank.position.set(x, -2.45, seamZ + 37.5); scene.add(plank);
        }

        const foulLine = new THREE.Mesh(new THREE.BoxGeometry(laneWidth + 2, .25, .15), new THREE.MeshLambertMaterial({ color: 0xFF0000 }));
        foulLine.position.set(0, 0.12, seamZ - 9.5); scene.add(foulLine);

        const dotMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const darkPlankIndices = [2, 3.9, 5.8, 9.5, 11.4, 13.3];
        darkPlankIndices.forEach(i => {
            const leftX = -laneWidth / 2 + i * plankWidth + .35;
            const rightX = -laneWidth / 2 + i * plankWidth - .95;
            const leftDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
            leftDot.rotation.x = -Math.PI / 2; leftDot.position.set(leftX, 0.3, 12); scene.add(leftDot);
            const rightDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
            rightDot.rotation.x = -Math.PI / 2; rightDot.position.set(rightX, 0.3, 12); scene.add(rightDot);
        });

        const approachPlankIndices = [1.85,3.80,5.75,7.7,9.65,11.55,13.3];
        const approachDotZ = seamZ + 4;
        approachPlankIndices.forEach(i => {
            const centerX = -laneWidth / 2. + (i-.1) * plankWidth;
            const radius = (i === 10) ? 0.50 : 0.32;
            const dot = new THREE.Mesh(new THREE.CircleGeometry(radius, 25), dotMat);
            dot.rotation.x = -Math.PI / 2;
            dot.position.set(centerX, 0.1, approachDotZ); scene.add(dot);
        });

        const arrowMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
        function createArrow(x, z) {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, -1.35,-3.2,0, 1.35,-3.2,0]), 3));
            const arrow = new THREE.Mesh(geo, arrowMat);
            arrow.position.set(x, 0.48, z);
            arrow.rotation.x = -Math.PI / 2;
            scene.add(arrow);
        }
        const darkCenters = [1.75, 3.5, 5.5, 7.25, 9.15, 11, 12.9].map(i => -laneWidth / 2 + (i + .25) * plankWidth);
        createArrow(darkCenters[3], -110);
        createArrow(darkCenters[2], -100);
        createArrow(darkCenters[4], -100);
        createArrow(darkCenters[1], -90);
        createArrow(darkCenters[5], -90);
        createArrow(darkCenters[0], -80);
        createArrow(darkCenters[6], -80);

        let pins = [];
        function createPin(x, z) {
            const h = PIN_HEIGHT_SCALE;
            const w = PIN_WIDTH_SCALE;
            const group = new THREE.Group();

            // Lower body
            const lowerBody = new THREE.Mesh(
                new THREE.CylinderGeometry(1.38 * w, 1.62 * w, 3.1 * h, 32),
                new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 90, specular: 0x222222 })
            );
            lowerBody.position.y = 2.05 * h;
            group.add(lowerBody);

            // Upper body
            const upperBody = new THREE.Mesh(
                new THREE.CylinderGeometry(1.62 * w, 0.78 * w, 2.4 * h, 32),
                new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 90, specular: 0x222222 })
            );
            upperBody.position.y = 4.55 * h;
            group.add(upperBody);

            // Red stripe
            const stripe = new THREE.Mesh(
                new THREE.CylinderGeometry(1.65 * w, 1.65 * w, 0.48 * h, 32),
                new THREE.MeshPhongMaterial({ color: 0xFF0000, shininess: 60 })
            );
            stripe.position.y = 3.55 * h;
            group.add(stripe);

            // Bottle neck
            const neck = new THREE.Mesh(
                new THREE.CylinderGeometry(0.48 * w, 0.78 * w, 1.15 * h, 32),
                new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 90 })
            );
            neck.position.y = 6.35 * h;
            group.add(neck);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.68 * w, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 100 })
            );
            head.position.y = 7.35 * h;
            group.add(head);

            group.position.set(x, -1.85 * h, z);
            scene.add(group);

            const pinData = { 
                group, 
                velocity: new THREE.Vector3(), 
                angularVelocity: new THREE.Vector3(), 
                isStanding: true, 
                radius: 1.48 * w, 
                originalPosition: new THREE.Vector3(x, -1.85 * h, z) 
            };
            pins.push(pinData);
            return group;
        }

        const pinPositions = [
            [0, -205 - laneExtension],
            [-3.7, -210 - laneExtension], [3.7, -210 - laneExtension],
            [-7.4, -215 - laneExtension], [0, -215 - laneExtension], [7.4, -215 - laneExtension],
            [-11.0, -220 - laneExtension], [-3.7, -220 - laneExtension], [3.7, -220 - laneExtension], [11.0, -220 - laneExtension]
        ];
        pinPositions.forEach(pos => createPin(pos[0], pos[1]));

        const pinBoxMat = new THREE.MeshLambertMaterial({ color: 0x3C2F2F });
        const fullGutterWidth = laneWidth + 2 * (gutterChannelWidth + gutterOffset + 2);

        const pinCeiling = new THREE.Mesh(new THREE.BoxGeometry(fullGutterWidth, 3, 70), pinBoxMat);
        pinCeiling.position.set(0, 16, -235 - laneExtension);
        scene.add(pinCeiling);

        const pinLeftWall = new THREE.Mesh(new THREE.BoxGeometry(2, 22, 70), pinBoxMat);
        pinLeftWall.position.set(-(laneWidth/2.5 + gutterChannelWidth + gutterOffset + 1), 6, -235 - laneExtension);
        scene.add(pinLeftWall);

        const pinRightWall = new THREE.Mesh(new THREE.BoxGeometry(2, 22, 70), pinBoxMat);
        pinRightWall.position.set(+(laneWidth/2.5 + gutterChannelWidth + gutterOffset + 1), 6, -235 - laneExtension);
        scene.add(pinRightWall);

        const pinBackWall = new THREE.Mesh(new THREE.BoxGeometry(fullGutterWidth, 21, 2), pinBoxMat);
        pinBackWall.position.set(0, 6, -278 - laneExtension);
        scene.add(pinBackWall);

        let previewBalls = [];
        function createPreviewBalls() {
            previewBalls.forEach(b => scene.remove(b));
            previewBalls = [];

            const rackMat = new THREE.MeshLambertMaterial({ color: 0x8B5A2B });
            const rackBase = new THREE.Mesh(new THREE.BoxGeometry(19, 1.2, 14), rackMat);
            rackBase.position.set(26.5, -0.1, 52);
            scene.add(rackBase);

            const previewRadius = 1.65;
            const startX = 14.5;
            const spacingX = 3.8;
            const row1Z = 47;
            const row2Z = 55.5;

            balls.forEach((b, i) => {
                const row = Math.floor(i / 5);
                const col = i % 5;
                const z = row === 0 ? row1Z : row2Z;
                const x = startX + col * spacingX;

                const pBall = new THREE.Mesh(
                    new THREE.SphereGeometry(previewRadius, 48, 48),
                    new THREE.MeshPhongMaterial({ color: b.color, shininess: 95, specular: 0x555555 })
                );
                pBall.position.set(x, 1.05 + (row * 0.1), z);
                pBall.userData = { ballData: b };
                scene.add(pBall);
                previewBalls.push(pBall);
            });
        }

        let mainAimBar = null;
        let highlights = [];

        function createAimHighlights() {
            highlights.forEach(h => scene.remove(h));
            highlights = [];
            const highlightMat = new THREE.MeshBasicMaterial({ color: 0x39FF14, transparent: true, opacity: 0.85 });
            for (let i = 0; i < 12; i++) {
                const h = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), highlightMat);
                scene.add(h);
                highlights.push(h);
            }
        }

        let ballMesh = null;
        function createBallMesh() {
            if (ballMesh) scene.remove(ballMesh);
            const radius = ballRadiusBase + (currentBall.precision / 15) * 0.9;
            ballMesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 48, 48), new THREE.MeshPhongMaterial({ color: currentBall.color, shininess: 95, specular: 0x555555 }));
            ballMesh.position.set(0, LANE_TOP_Y, 23);
            scene.add(ballMesh);
        }

        const loader = new THREE.TextureLoader();
        const logoTexture = loader.load('back of lane sample.png');
        const logoPlane = new THREE.Mesh(new THREE.PlaneGeometry(45, 20), new THREE.MeshBasicMaterial({ map: logoTexture, side: THREE.DoubleSide, transparent: true }));
        logoPlane.position.set(0, 5.5, -275.5 - laneExtension);
        scene.add(logoPlane);

        const collectorMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        const LANE_END_Z = -225 - laneExtension;
        const COLLECTOR_Z = LANE_END_Z;
        const collectorFloor = new THREE.Mesh(new THREE.BoxGeometry(laneWidth + COLLECTOR_EXTRA_WIDTH, 2, 55), collectorMat);
        collectorFloor.position.set(0, -8.8, LANE_END_Z - 51.5);
        scene.add(collectorFloor);

        const collectorBack = new THREE.Mesh(new THREE.BoxGeometry(laneWidth + COLLECTOR_EXTRA_WIDTH, 12, 3), collectorMat);
        collectorBack.position.set(0, -1, LANE_END_Z - 55);
        scene.add(collectorBack);

        const gutterMat = new THREE.MeshLambertMaterial({ color: 0x5C4033 });
        const gutterLength = 345;
        const gutterStartZ = seamZ -15 ; 

        const leftGutter = new THREE.Mesh(new THREE.BoxGeometry(gutterChannelWidth, gutterDepth, gutterLength), gutterMat);
        leftGutter.position.set( -(laneWidth / 2 + gutterOffset + gutterChannelWidth / 3), -gutterDepth / 1 + 1.0, gutterStartZ - gutterLength / 2);
        scene.add(leftGutter);

        const rightGutter = new THREE.Mesh(new THREE.BoxGeometry(gutterChannelWidth, gutterDepth, gutterLength), gutterMat);
        rightGutter.position.set( +(laneWidth / 2 + gutterOffset + gutterChannelWidth / 3), -gutterDepth / 1 + 1.0, gutterStartZ - gutterLength / 2);
        scene.add(rightGutter);

        let ballVelocity = new THREE.Vector3(0,0,0);
        let spinAtRelease = 0;
        let aimAngle = 0;
        let isRolling = false;
        let inGutter = false;
        let goingToCollector = false;
        let isDragging = false;
        let dragStartMouse = new THREE.Vector2();
        let dragStartBallPos = new THREE.Vector3();
        let currentTimer = 25;
        let timerInterval = null;
        let endRollTimeout = null;
        let hasHitPins = false;
        let ballLaunchedThisTurn = false;

        const MAX_ROLL_TIME = 25;
        const timerElement = document.getElementById('timer');
        const foulElement = document.getElementById('foul');
        const pinResultElement = document.getElementById('pinResult');
        const timeUpElement = document.getElementById('timeUp');
        const debugPanel = document.getElementById('debug');
        const FRICTION_BASE = 0.99999;
        const MIN_VELOCITY = 0.005;
        const GUTTER_END_Z = -275 - laneExtension;
        const PIN_AREA_Z = -140 - laneExtension / 2;
        const HOOK_START_Z = -115;
        const PIN_DECK_Z = -175;
        const GUTTER_BALL_Y = -4.5;

        let spinPhase = 0;
        const spinIndicator = document.getElementById('spinIndicator');

        const aimBarMaterial = new THREE.MeshBasicMaterial({ color: 0x39FF14, transparent: true, opacity: 0.3, depthWrite: false });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const dom = renderer.domElement;
        const keys = {};
        let fullView = false;

        const FIXED_TIMESTEP = 1 / 60;
        let accumulator = 0;
        const PIN_COLLISION_SUBSTEPS = 10;

        function onMouseClick(event) {
            if (isRolling || isDragging) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(previewBalls);
            if (intersects.length > 0) {
                currentBall = intersects[0].object.userData.ballData;
                document.getElementById('currentBallName').textContent = currentBall.name;
                createBallMesh();
            }
        }
        dom.addEventListener('mousedown', onMouseClick);

        dom.addEventListener('mousedown', e => { if (isRolling) return; isDragging = true; dragStartMouse.set(e.clientX, e.clientY); dragStartBallPos.copy(ballMesh.position); });
        dom.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const deltaX = (e.clientX - dragStartMouse.x) * 0.14;
            const deltaZ = (e.clientY - dragStartMouse.y) * 0.085;
            ballMesh.position.x = dragStartBallPos.x + deltaX;
            ballMesh.position.z = dragStartBallPos.z + deltaZ;
            ballMesh.position.x = Math.max(-11.5, Math.min(11.5, ballMesh.position.x));
            ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z));
        });
        dom.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; launchBall(); } });

        dom.addEventListener('touchstart', e => { 
            if (isRolling || !e.touches.length) return; 
            e.preventDefault();
            isDragging = true; 
            const t = e.touches[0]; 
            dragStartMouse.set(t.clientX, t.clientY); 
            dragStartBallPos.copy(ballMesh.position); 
        });

        dom.addEventListener('touchmove', e => {
            if (!isDragging) return;
            e.preventDefault();
            const t = e.touches[0];
            const deltaX = (t.clientX - dragStartMouse.x) * 0.14;
            const deltaZ = (t.clientY - dragStartMouse.y) * 0.085;
            ballMesh.position.x = dragStartBallPos.x + deltaX;
            ballMesh.position.z = dragStartBallPos.z + deltaZ;
            ballMesh.position.x = Math.max(-8.5, Math.min(8.5, ballMesh.position.x));
            ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z));
        });
        dom.addEventListener('touchend', () => { if (isDragging) { isDragging = false; launchBall(); } });

        function launchBall() {
            ballLaunchedThisTurn = true;

            const pullDistance = Math.max(0, ballMesh.position.z - 23);
            if (pullDistance <= 0) return;

            const frontOfBall = ballMesh.position.z - ballRadiusBase;
            if (frontOfBall < foulDetectionZ) {
                foulElement.style.display = 'block';
                setTimeout(() => { foulElement.style.display = 'none'; }, 1800);
                ballVelocity.set(ballMesh.position.x * 0.003, 0, -3.5);
                spinAtRelease = 0;
            } else {
                const power = 3.4 + pullDistance * 0.1;
                const baseVx = ballMesh.position.x * 0.0085 + Math.sin(aimAngle) * 3.8;
                let percent = parseFloat(spinIndicator.style.left) || 50;
                let normalized = (percent - 50) / 50;
                let spinPower = Math.pow(Math.abs(normalized), 2.4);
                spinAtRelease = Math.sign(normalized) * spinPower * 0.92;
                ballVelocity.set(baseVx, 0, -power);
            }

            isRolling = true;
            inGutter = false;
            goingToCollector = false;
            hasHitPins = false;
            if (endRollTimeout) clearTimeout(endRollTimeout);
            endRollTimeout = null;
        }

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === 'r' && !isRolling) resetBallAndTimer();
            if (e.key.toLowerCase() === 'v') fullView = !fullView;
        });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        function updateSpinTicker() {
            const tickerSpeed = 1.8 * (11 - currentBall.control) / 5;
            spinPhase += tickerSpeed * 0.016;
            const percent = (Math.sin(spinPhase) + 1) * 50;
            spinIndicator.style.left = percent + '%';
        }

        function resetPins() {
            pins.forEach(pin => {
                pin.group.position.copy(pin.originalPosition);
                pin.group.rotation.set(0, 0, 0);
                pin.velocity.set(0, 0, 0);
                pin.angularVelocity.set(0, 0, 0);
                pin.isStanding = true;
            });
        }

        function countStandingPins() {
            return pins.filter(pin => pin.isStanding).length;
        }

        function showResult(text, color = '#00ff88') {
            const resultEl = pinResultElement;
            resultEl.textContent = text;
            resultEl.style.color = color;
            resultEl.style.display = 'block';
            resultEl.style.opacity = '1';

            setTimeout(() => {
                resultEl.style.opacity = '0';
                setTimeout(() => { resultEl.style.display = 'none'; }, 600);
            }, 2000);
        }

        function showTimeUp() {
            timeUpElement.textContent = "TIME-UP";
            timeUpElement.style.display = 'block';
            timeUpElement.style.opacity = '1';

            setTimeout(() => {
                timeUpElement.style.opacity = '0';
                setTimeout(() => { 
                    timeUpElement.style.display = 'none';
                    endTurnAfterTimeUp();
                }, 600);
            }, 1800);
        }

        function endTurnAfterTimeUp() {
            isRolling = false;
            inGutter = false;
            goingToCollector = false;
            ballVelocity.set(0,0,0);
            spinAtRelease = 0;
            aimAngle = 0;
            hasHitPins = false;
            ballMesh.position.set(0, LANE_TOP_Y, 23);
            if (mainAimBar) mainAimBar.visible = true;
            highlights.forEach(h => { if (h) h.visible = true; });
            resetPins();
            startNewTurnTimer();
        }

        function checkBallPinCollisions() {
            if (!isRolling || ballVelocity.length() < 0.3 || ballMesh.position.z > PIN_DECK_Z) return;
            const bPos = ballMesh.position;
            const speed = ballVelocity.length();
            for (let pin of pins) {
                if (!pin.isStanding) continue;
                const pPos = pin.group.position;
                const dx = bPos.x - pPos.x;
                const dz = bPos.z - pPos.z;
                const distSq = dx*dx + dz*dz;
                const minDistSq = Math.pow(ballRadiusBase + pin.radius, 2);
                if (distSq < minDistSq) {
                    const dist = Math.sqrt(distSq) || 0.01;
                    const nx = dx / dist;
                    const nz = dz / dist;

                    const overlap = (ballRadiusBase + pin.radius) - dist + 0.1;
                    pin.group.position.x += nx * overlap * 0.6;
                    pin.group.position.z += nz * overlap * 0.6;

                    const impulse = Math.max(12, speed * 2.2);
                    const lift = 7.5 + speed * 1.3;
                    const spinFactor = 18 + speed * 2.4;

                    pin.velocity.set(nx * impulse * 1.25, lift, nz * impulse * 1.15);
                    pin.angularVelocity.set(nz * spinFactor * 1.6, 0, -nx * spinFactor * 1.6);

                    pin.isStanding = false;

                    ballVelocity.multiplyScalar(0.62);

                    if (!hasHitPins) {
                        hasHitPins = true;
                        if (endRollTimeout) clearTimeout(endRollTimeout);
                        endRollTimeout = setTimeout(endRoll, 5000);
                    }
                    return;
                }
            }
        }

        function checkPinPinCollisions() {
            for (let i = 0; i < pins.length; i++) {
                for (let j = i + 1; j < pins.length; j++) {
                    const p1 = pins[i];
                    const p2 = pins[j];
                    const dx = p1.group.position.x - p2.group.position.x;
                    const dz = p1.group.position.z - p2.group.position.z;
                    const distSq = dx*dx + dz*dz;
                    const minDistSq = Math.pow(p1.radius + p2.radius, 2);
                    if (distSq >= minDistSq) continue;
                    const dist = Math.sqrt(distSq) || 0.01;
                    const nx = dx / dist;
                    const nz = dz / dist;
                    const v1x = p1.velocity.x; const v1z = p1.velocity.z;
                    const v2x = p2.velocity.x; const v2z = p2.velocity.z;
                    const dot = (v1x - v2x) * nx + (v1z - v2z) * nz;
                    if (dot > 0) continue;
                    const impulse = -dot * 3.2;
                    const lift = 6.0 + Math.abs(dot) * 1.6;
                    p1.velocity.x += nx * impulse * 1.05;
                    p1.velocity.z += nz * impulse * 1.05;
                    p2.velocity.x -= nx * impulse * 1.05;
                    p2.velocity.z -= nz * impulse * 1.05;
                    p1.velocity.y += lift;
                    p2.velocity.y += lift;
                    p1.angularVelocity.set(nz * 18, 0, -nx * 18);
                    p2.angularVelocity.set(-nz * 18, 0, nx * 18);
                    if (p1.isStanding) p1.isStanding = false;
                    if (p2.isStanding) p2.isStanding = false;
                    const overlap = (p1.radius + p2.radius) - dist + 0.2;
                    p1.group.position.x += nx * overlap * 0.75;
                    p1.group.position.z += nz * overlap * 0.75;
                    p2.group.position.x -= nx * overlap * 0.75;
                    p2.group.position.z -= nz * overlap * 0.75;
                }
            }
        }

        function updatePins(delta) {
            for (let pin of pins) {
                if (!pin.isStanding) {
                    pin.velocity.y -= 48 * delta;
                    pin.group.position.addScaledVector(pin.velocity, delta * 32);

                    pin.group.rotation.x += pin.angularVelocity.x * delta * 14;
                    pin.group.rotation.z += pin.angularVelocity.z * delta * 14;

                    const maxTip = Math.PI / 2;
                    if (Math.abs(pin.velocity.x) < 0.15 && Math.abs(pin.velocity.z) < 0.15 && Math.abs(pin.velocity.y) < 0.5) {
                        if (pin.group.rotation.x > maxTip) pin.group.rotation.x = maxTip;
                        if (pin.group.rotation.x < -maxTip) pin.group.rotation.x = -maxTip;
                        if (pin.group.rotation.z > maxTip) pin.group.rotation.z = maxTip;
                        if (pin.group.rotation.z < -maxTip) pin.group.rotation.z = -maxTip;
                    }

                    pin.velocity.multiplyScalar(0.935);
                    pin.angularVelocity.multiplyScalar(0.89);

                    if (pin.group.position.y < 0.95) {
                        pin.group.position.y = 0.95;
                        pin.velocity.y = Math.abs(pin.velocity.y) * 0.65;
                        pin.velocity.x *= 0.75;
                        pin.velocity.z *= 0.75;
                        if (pin.velocity.y < 0.2) pin.velocity.y = 0;
                    }

                    if (pin.group.position.x < -13) { pin.group.position.x = -13; pin.velocity.x = Math.abs(pin.velocity.x) * 0.6; }
                    if (pin.group.position.x > 13) { pin.group.position.x = 13; pin.velocity.x = -Math.abs(pin.velocity.x) * 0.6; }
                    if (pin.group.position.z < -230 - laneExtension) { pin.group.position.z = -230 - laneExtension; pin.velocity.z = Math.abs(pin.velocity.z) * 0.6; }
                    if (pin.group.position.z > -195 - laneExtension) { pin.group.position.z = -195 - laneExtension; pin.velocity.z = -Math.abs(pin.velocity.z) * 0.6; }
                    if (pin.group.position.y > 18) { pin.group.position.y = 18; pin.velocity.y = -Math.abs(pin.velocity.y) * 0.4; }
                }
            }
        }

        function endRoll() {
            isRolling = false;
            inGutter = false;
            goingToCollector = false;
            ballVelocity.set(0,0,0);
            spinAtRelease = 0;
            aimAngle = 0;
            hasHitPins = false;

            const standing = countStandingPins();
            const knocked = 10 - standing;
            let text = `${knocked} PINS`;
            if (knocked === 10) text = "STRIKE!";
            else if (knocked === 0) text = "GUTTER";
            else if (knocked === 1) text = "1 PIN";

            showResult(text);

            ballMesh.position.set(0, LANE_TOP_Y, 23);
            if (mainAimBar) mainAimBar.visible = true;
            highlights.forEach(h => { if (h) h.visible = true; });
            resetPins();
            startNewTurnTimer();
            endRollTimeout = null;
        }

        function startNewTurnTimer() {
            currentTimer = MAX_ROLL_TIME;
            timerElement.style.display = 'block';
            timerElement.textContent = currentTimer;
            timerElement.classList.remove('pulse');
            timerElement.style.color = '#ff0';
            ballLaunchedThisTurn = false;

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                currentTimer--;
                timerElement.textContent = currentTimer;
                if (currentTimer > 10) timerElement.style.color = '#ff0';
                else if (currentTimer > 8) timerElement.style.color = '#ffbb00';
                else if (currentTimer > 6) timerElement.style.color = '#ff8800';
                else if (currentTimer > 5) timerElement.style.color = '#ff5500';
                else timerElement.style.color = '#ff0000';
                if (currentTimer <= 5) {
                    if (!timerElement.classList.contains('pulse')) timerElement.classList.add('pulse');
                } else {
                    timerElement.classList.remove('pulse');
                }
                if (currentTimer <= 0 && !isRolling) {
                    if (!ballLaunchedThisTurn) {
                        showTimeUp();
                    } else {
                        endRoll();
                    }
                }
            }, 1000);
        }

        function resetBallAndTimer() {
            if (endRollTimeout) clearTimeout(endRollTimeout);
            endRollTimeout = null;
            ballMesh.position.set(0, LANE_TOP_Y, 23);
            ballVelocity.set(0,0,0);
            spinAtRelease = 0;
            aimAngle = 0;
            isRolling = false;
            inGutter = false;
            goingToCollector = false;
            hasHitPins = false;
            ballLaunchedThisTurn = false;
            resetPins();
            startNewTurnTimer();
        }

        let lastTime = Date.now();
        let lightProgress = 0;

        function updateAimLine() {
            if (mainAimBar) mainAimBar.visible = true;
            highlights.forEach(h => { if (h) h.visible = true; });

            const pullDistance = Math.max(0, ballMesh.position.z - 23);
            const power = 3.4 + pullDistance * 0.1;
            const baseVx = ballMesh.position.x * 0.0085 + Math.sin(aimAngle) * 3.8;
            const baseVz = -power;

            const projectionDistance = 100;
            const steps = 65;

            const points = [];
            const dirScale = projectionDistance / Math.abs(baseVz);

            for (let i = 0; i < steps; i++) {
                const t = i / (steps - 1);
                let x = ballMesh.position.x + t * baseVx * dirScale;
                x = Math.max(-12.8, Math.min(12.8, x));
                const z = ballMesh.position.z + t * baseVz * dirScale;
                points.push(new THREE.Vector3(x, ballMesh.position.y + 0.02, z));
            }

            if (mainAimBar) scene.remove(mainAimBar);
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.85, 8, false);
            mainAimBar = new THREE.Mesh(tubeGeo, aimBarMaterial);
            scene.add(mainAimBar);

            const baseSpeed = 1.6;
            for (let k = 0; k < highlights.length; k++) {
                const offset = k * 0.16;
                const headT = ((lightProgress + offset) % baseSpeed) / baseSpeed;
                let highlightX = ballMesh.position.x + headT * baseVx * dirScale * 0.98;
                highlightX = Math.max(-12.8, Math.min(12.8, highlightX));
                const highlightZ = ballMesh.position.z + headT * baseVz * dirScale * 0.98;
                highlights[k].position.set(highlightX, ballMesh.position.y + 0.08, highlightZ);
                highlights[k].scale.setScalar(1.35);
            }
            lightProgress += 0.007;
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            let delta = (now - lastTime) / 1000 || 0.016;
            lastTime = now;
            if (delta > 0.1) delta = 0.1;

            accumulator += delta;

            while (accumulator >= FIXED_TIMESTEP) {
                if (isRolling) {
                    const speed = ballVelocity.length();
                    ballMesh.rotation.x -= speed * 0.095;
                    ballMesh.rotation.z = -ballVelocity.x * 0.75;

                    let hookFactor = 0;
                    if (ballMesh.position.z < HOOK_START_Z) hookFactor = Math.min(1.0, (HOOK_START_Z - ballMesh.position.z) / 45);
                    ballVelocity.x += spinAtRelease * FIXED_TIMESTEP * 2.8 * hookFactor;

                    ballVelocity.multiplyScalar(FRICTION_BASE);
                    ballMesh.position.add(ballVelocity.clone().multiplyScalar(FIXED_TIMESTEP * 24));

                    if (!inGutter && Math.abs(ballMesh.position.x) > 12.5) inGutter = true;

                    if (inGutter) {
                        const targetGutterX = ballMesh.position.x > 0 ? 15.75 : -15.75;
                        ballMesh.position.x = ballMesh.position.x * 0.85 + targetGutterX * 0.15;
                        ballMesh.position.y = Math.max(GUTTER_BALL_Y +3.8, ballMesh.position.y - 0.25);
                        ballVelocity.z *= 0.9985;
                        ballVelocity.x *= 0.35;
                    } else {
                        ballMesh.position.y = LANE_TOP_Y;
                    }

                    if (!goingToCollector && (hasHitPins || ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < (inGutter ? GUTTER_END_Z - 60 : LANE_END_Z + 35))) {
                        goingToCollector = true;
                        ballVelocity.z = -Math.abs(ballVelocity.z) * 0.48;
                    }

                    if (goingToCollector) {
                        ballVelocity.z *= 1.0;
                        if (ballMesh.position.z < COLLECTOR_Z - 5) {
                            ballMesh.position.y = Math.max(-8.8, ballMesh.position.y -2.8);
                            ballVelocity.set(0, 0, 0);
                            if (endRollTimeout === null) endRollTimeout = setTimeout(endRoll, 800);
                        }
                    }

                    if (ballMesh.position.z < -235 - laneExtension) {
                        ballMesh.position.y = Math.max(GUTTER_BALL_Y, ballMesh.position.y - 0.35);
                        if (!inGutter) {
                            ballVelocity.z *= 0.79;
                            ballVelocity.x *= 0.62;
                        } else {
                            ballVelocity.z *= 0.985;
                        }
                    }

                    checkBallPinCollisions();
                    updatePins(FIXED_TIMESTEP);
                    for (let i = 0; i < PIN_COLLISION_SUBSTEPS; i++) {
                        checkPinPinCollisions();
                    }

                    const endZ = inGutter ? GUTTER_END_Z : LANE_END_Z;
                    if (!hasHitPins && (ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < endZ)) {
                        if (endRollTimeout === null) endRollTimeout = setTimeout(endRoll, 1800);
                    }
                }
                accumulator -= FIXED_TIMESTEP;
            }

            if (!isRolling) {
                updateSpinTicker();
                updateAimLine();
                if (!fullView) {
                    camera.position.set(0, 26, 85);
                    camera.lookAt(0, 14, 20);
                } else {
                    camera.position.set(0, 140, 220);
                    camera.lookAt(0, 0, -80);
                }
                if (keys['ArrowLeft']) aimAngle -= 0.012;
                if (keys['ArrowRight']) aimAngle += 0.012;
                aimAngle = Math.max(-0.7, Math.min(0.7, aimAngle));
            }

            if (isRolling && ballMesh.position.z < PIN_AREA_Z) {
                camera.position.x = camera.position.x * 0.85 + ballMesh.position.x * 0.15;
                camera.position.y = 12;
                camera.position.z = camera.position.z * 0.88 + (-152 - laneExtension / 2) * 0.12;
                camera.lookAt(0, 2, -205 - laneExtension);
                if (ballMesh.position.y > 1.2) ballMesh.position.y = 1.2;
            } else if (isRolling) {
                const targetCameraZ = ballMesh.position.z + 62;
                camera.position.z = camera.position.z * 0.82 + targetCameraZ * 0.18;
                camera.position.y = 36;
                camera.position.x = ballMesh.position.x * 0.3;
                camera.lookAt(ballMesh.position.x * 0.3, 14, ballMesh.position.z - 55);
            }

            renderer.render(scene, camera);
        }

        createPreviewBalls();
        createAimHighlights();
        createBallMesh();

        animate();

        window.addEventListener('load', () => {
            startNewTurnTimer();
            resetPins();
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
