        #tickLittleRight { left: 63%; } #tickMediumRight { left: 76%; } #tickHighRight { left: 89%; }

        #pinDiagram { width: 220px; height: 195px; }

            left: 50%; 
            transform: translateX(-50%);

    const container = document.getElementById('remainingPins');

        <circle cx="140" cy="60" r="13" fill="#ffcc00" stroke="#fff" stroke-width="4"/>

        <circle cx="120" cy="100" r="13" fill="#ffcc00" stroke="#fff" stroke-width="4"/>
        <circle cx="100" cy="140" r="13" fill="#ffcc00" stroke="#fff" stroke-width="4"/>
        <text x="110" y="175" text-anchor="middle" fill="#ffff00" font-size="21" font-family="Sprite Graffiti" font-weight="bold">${message}</text>
    </g>`;

    const standing = pins.map(p => p.isStanding);
    const circles = svg.querySelectorAll('circle');
    const order = [6,7,8,9,3,4,5,1,2,0];

    for (let i = 0; i < 10; i++) {
        if (!standing[i]) circles[order[i]].setAttribute('fill', '#555555');
    }
    container.style.display = 'block';

    setTimeout(() => {
        hideRemainingPinsVisual();
    }, 3000);
}

function hideRemainingPinsVisual() {
    document.getElementById('remainingPins').style.display = 'none';
}

function clearFallenPins() {
    pins.forEach(pin => { if (!pin.isStanding) pin.group.visible = false; });
}

function getCurrentScore() {
    let score = 0; let rollIndex = 0;
    for (let frame = 0; frame < MAX_FRAMES; frame++) {
        if (rollIndex >= allRolls.length) break;
        const roll1 = allRolls[rollIndex];
        if (roll1 === 10) {
            score += 10;
            if (rollIndex + 1 < allRolls.length) score += allRolls[rollIndex + 1];
            if (rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 1;
        } else {
            const roll2 = allRolls[rollIndex + 1] || 0;
            const sum = roll1 + roll2;
            score += sum;
            if (sum === 10 && rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 2;
        }
    }
    return score;
}

            for (let i = 0; i < frameData.length; i++) {
                const r = frameData[i];
                if (r === 10) html += `<div class="rollBox">X</div>`;
                else if (i === 1 && frameData[0] + r === 10 && frameData[0] !== 10) html += `<div class="rollBox">/</div>`;
                else html += `<div class="rollBox">${r}</div>`;
            }
        }
        rollsDiv.innerHTML = html;

        let frameTotal = '';
        const isComplete = (f < currentFrame) || 
                          (rollsInCurrentFrame === 2) || 
                          (frameData[0] === 10 && rollsInCurrentFrame === 1) ||
                          (f === 3 && frameData.length > 0);

        if (isComplete) {
            let frameScore = 0;
            if (frameData.length > 0) {
                const roll1 = frameData[0];
                if (roll1 === 10) {
                    frameScore = 10;
                    const idx = allRolls.indexOf(roll1);
                    if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    if (idx + 2 < allRolls.length) frameScore += allRolls[idx + 2] || 0;
                } else {
                    const roll2 = frameData[1] || 0;
                    frameScore = roll1 + roll2;
                    if (roll1 + roll2 === 10) {
                        const idx = allRolls.indexOf(roll2);
                        if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    }
                }
            }
            runningTotal += frameScore;
            frameTotal = runningTotal;
        }
        document.getElementById('score' + f).textContent = frameTotal;
    }
    document.querySelectorAll('.frame').forEach((f, i) => f.classList.toggle('active', i + 1 === currentFrame));
}

function resetPins() {
    pins.forEach(pin => {
        pin.group.position.copy(pin.originalPosition);
        pin.group.rotation.set(0, 0, 0);
        pin.group.visible = true;
        pin.velocity.set(0, 0, 0);
        pin.angularVelocity.set(0, 0, 0);
        pin.isStanding = true;
    });
    hideRemainingPinsVisual();
}

function countStandingPins() { return pins.filter(pin => pin.isStanding).length; }
function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showResult(text, color = '#39ff14') {
    const resultEl = pinResultElement;
    resultEl.textContent = text;
    resultEl.style.color = color;
    resultEl.style.display = 'block';
    resultEl.style.opacity = '1';
    setTimeout(() => { resultEl.style.opacity = '0'; setTimeout(() => { resultEl.style.display = 'none'; }, 600); }, 2200);
}

function showTimeUp() {
    timeUpElement.textContent = "ROLL LOST";
    timeUpElement.style.display = 'block';
    timeUpElement.style.opacity = '1';
    setTimeout(() => { timeUpElement.style.opacity = '0'; setTimeout(() => { timeUpElement.style.display = 'none'; endTurnAfterTimeUp(); }, 600); }, 2200);
}

function startNewRoll() {
    updateScoreboard();

    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    ballMesh.position.set(0, LANE_TOP_Y, 23);
    ballVelocity.set(0,0,0);
    spinAtRelease = 0;
    aimAngle = 0;
    isRolling = false;
    inGutter = false;
    goingToCollector = false;
    hasHitPins = false;
    ballLaunchedThisTurn = false;
    timerHasStarted = false;
    pinsStandingAtStartOfRoll = countStandingPins();

    if (mainAimBar) mainAimBar.visible = true;
    highlights.forEach(h => { if (h) h.visible = true; });

    timerElement.style.display = 'block';
    timerElement.textContent = "READY";
    timerElement.style.color = '#39ff14';
    timerElement.classList.remove('pulse');

    setTimeout(() => { timerElement.textContent = "SET"; }, 1000);
    setTimeout(() => { timerElement.textContent = "BOWL!"; }, 2000);
    setTimeout(() => { startNewTurnTimer(); }, 3000);
}

function startNewTurnTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    currentTimer = MAX_ROLL_TIME;
    timerElement.style.display = 'block';
    timerElement.textContent = currentTimer;
    timerElement.style.color = '#39ff14';
    timerElement.classList.remove('pulse');
    ballLaunchedThisTurn = false;
    timerHasStarted = true;

    timerInterval = setInterval(() => {
        if (currentTimer > 0) currentTimer--;
        timerElement.textContent = currentTimer;

        if (currentTimer > 15) timerElement.style.color = '#39ff14';
        else if (currentTimer > 10) timerElement.style.color = '#ffff00';
        else if (currentTimer > 5) timerElement.style.color = '#ff8800';
        else timerElement.style.color = '#ff0000';

        if (currentTimer <= 5) timerElement.classList.add('pulse');
        else timerElement.classList.remove('pulse');

        if (currentTimer <= 0 && !isRolling) {
            if (!ballLaunchedThisTurn) showTimeUp();
            else endCurrentRoll();
        }
    }, 1000);
}

function isFrameComplete(knockedThisRoll) {
    if (!isFinalFrame) return (rollsInCurrentFrame === 1 && knockedThisRoll === 10) || rollsInCurrentFrame === 2;
    if (rollsInCurrentFrame === 1 && knockedThisRoll === 10) return false;
    if (rollsInCurrentFrame === 2) {
        const first = frameRolls[2][0] || 0;
        const second = frameRolls[2][1] || 0;
        if (first === 10 || first + second === 10) return false;
    }
    return rollsInCurrentFrame >= 3 || (rollsInCurrentFrame === 2 && (frameRolls[2][0] || 0) + (frameRolls[2][1] || 0) < 10);
}

function advanceToNextFrame() {
    currentFrame++;
    if (currentFrame > MAX_FRAMES) {
        gameOver = true;
        showResult(`GAME OVER — ${getCurrentScore()}`, '#39ff14');
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        document.getElementById('playAgain').style.display = 'block';
        return;
    }
    isFinalFrame = (currentFrame === MAX_FRAMES);
    resetPins();
    rollsInCurrentFrame = 0;
    frameRolls[currentFrame-1] = [];
    startNewRoll();
}

function endCurrentRoll() {
    isRolling = false;
    inGutter = false;
    goingToCollector = false;
    ballVelocity.set(0,0,0);
    spinAtRelease = 0;
    aimAngle = 0;
    hasHitPins = false;

    const standingNow = countStandingPins();
    const knockedThisRoll = Math.max(0, pinsStandingAtStartOfRoll - standingNow);
    allRolls.push(knockedThisRoll);
    frameRolls[currentFrame-1].push(knockedThisRoll);
    rollsInCurrentFrame++;

    let resultText = "";
    let color = "#39ff14";
    let indicatorMessage = "";

    if (knockedThisRoll === 10 && rollsInCurrentFrame === 1) {
        resultText = getRandom(strikeMessages);
        color = "#39ff14";
    } else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll === 10)) {
        resultText = getRandom(spareMessages);
        color = "#39ff14";
    } else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll < 10)) {
        resultText = getRandom(missMessages);
        color = "#39ff14";
    } else if (knockedThisRoll === 0) {
        resultText = gutterMessage;
        color = "#ff0000";
        indicatorMessage = gutterMessage;
    } else {
        resultText = getRandom(missMessages);
        color = "#39ff14";
        indicatorMessage = resultText;
    }

    if (resultText) showResult(resultText, color);

    if (rollsInCurrentFrame === 1 && knockedThisRoll < 10) {
        clearFallenPins();
        updateRemainingPinsVisual(indicatorMessage);
    } else {
        hideRemainingPinsVisual();
    }

    updateScoreboard();

    if (isFrameComplete(knockedThisRoll)) {
        advanceToNextFrame();
    } else {
        if (isFinalFrame) {
            const first = frameRolls[2][0] || 0;
            if (rollsInCurrentFrame === 1 && knockedThisRoll === 10) resetPins();
            else if (rollsInCurrentFrame === 2 && (first === 10 || first + knockedThisRoll === 10)) resetPins();
        }
        startNewRoll();
    }
}

function endTurnAfterTimeUp() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    isRolling = false;
    ballVelocity.set(0,0,0);
    spinAtRelease = 0;
    aimAngle = 0;
    hasHitPins = false;
    ballMesh.position.set(0, LANE_TOP_Y, 23);
    if (mainAimBar) mainAimBar.visible = true;
    highlights.forEach(h => { if (h) h.visible = true; });

    const knockedThisRoll = 0;
    allRolls.push(knockedThisRoll);
    frameRolls[currentFrame-1].push(knockedThisRoll);
    rollsInCurrentFrame++;

    const indicatorMessage = gutterMessage;
    showTimeUp();
    updateScoreboard();

    if (rollsInCurrentFrame === 1 && knockedThisRoll < 10) {
        clearFallenPins();
        updateRemainingPinsVisual(indicatorMessage);
    } else {
        hideRemainingPinsVisual();
    }

    if (isFrameComplete(knockedThisRoll)) {
        advanceToNextFrame();
    } else {
        if (isFinalFrame) {
            const first = frameRolls[2][0] || 0;
            if (rollsInCurrentFrame === 1 && knockedThisRoll === 10) resetPins();
            else if (rollsInCurrentFrame === 2 && (first === 10 || first + knockedThisRoll === 10)) resetPins();
        }
        startNewRoll();
    }
}

function resetBallAndTimer() {
    if (endRollTimeout) clearTimeout(endRollTimeout);
    endRollTimeout = null;
    startNewRoll();
}

function newGame() {
    document.getElementById('playAgain').style.display = 'none';
    gameOver = false;
    currentFrame = 1;
    isFinalFrame = false;
    rollsInCurrentFrame = 0;
    allRolls = [];
    frameRolls = [[], [], []];
    resetPins();
    updateScoreboard();
    startNewRoll();
}

function launchBall() {
    if (gameOver) return;
    ballLaunchedThisTurn = true;

    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    const pullDistance = Math.max(0, ballMesh.position.z - 23);
    if (pullDistance <= 0) return;
    const frontOfBall = ballMesh.position.z - ballRadiusBase;
    if (frontOfBall < foulDetectionZ) {
        foulElement.style.display = 'block';
        setTimeout(() => { foulElement.style.display = 'none'; }, 1800);
        ballVelocity.set(ballMesh.position.x * 0.003, 0, -3.5);
        spinAtRelease = 0;
    } else {
        const power = 3.4 + pullDistance * 0.1;
        const baseVx = ballMesh.position.x * 0.0085 + Math.sin(aimAngle) * 3.8;
        let percent = parseFloat(spinIndicator.style.left) || 50;
        let normalized = (percent - 50) / 50;
        let spinPower = Math.pow(Math.abs(normalized), 2.4);
        spinAtRelease = Math.sign(normalized) * spinPower * 0.92;
        ballVelocity.set(baseVx, 0, -power);
    }
    isRolling = true;
    inGutter = false;
    goingToCollector = false;
    hasHitPins = false;
    if (endRollTimeout) clearTimeout(endRollTimeout);
    endRollTimeout = null;
}

function checkBallPinCollisions() {
    if (!isRolling || ballVelocity.length() < 0.3 || ballMesh.position.z > -175) return;
    const bPos = ballMesh.position;
    const speed = ballVelocity.length();
    for (let pin of pins) {
        if (!pin.isStanding) continue;
        const pPos = pin.group.position;
        const dx = bPos.x - pPos.x;
        const dz = bPos.z - pPos.z;
        const distSq = dx*dx + dz*dz;
        const minDistSq = Math.pow(ballRadiusBase + pin.radius, 2);
        if (distSq < minDistSq) {
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist;
            const nz = dz / dist;
            const overlap = (ballRadiusBase + pin.radius) - dist + 0.2;
            pin.group.position.x += nx * overlap * 0.8;
            pin.group.position.z += nz * overlap * 0.8;
            const impulse = Math.max(12, speed * 2.1);
            const lift = 7.0 + speed * 1.2;
            const spinFactor = 8.5 + speed * 1.0;
            const glancing = Math.abs(nx);
            pin.velocity.set(nx * impulse * 1.3, lift, nz * impulse * 1.25);
            pin.angularVelocity.set(nz * spinFactor * 0.75 * glancing, 0, -nx * spinFactor * 1.2);
            pin.isStanding = false;
            ballVelocity.multiplyScalar(0.55);
            if (!hasHitPins) {
                hasHitPins = true;
                if (endRollTimeout) clearTimeout(endRollTimeout);
                endRollTimeout = setTimeout(endCurrentRoll, 5000);
            }
            return;
        }
    }
}

function checkPinPinCollisions() {
    for (let i = 0; i < pins.length; i++) {
        for (let j = i + 1; j < pins.length; j++) {
            const p1 = pins[i]; const p2 = pins[j];
            const dx = p1.group.position.x - p2.group.position.x;
            const dz = p1.group.position.z - p2.group.position.z;
            const distSq = dx*dx + dz*dz;
            const minDistSq = Math.pow(p1.radius + p2.radius, 2);
            if (distSq >= minDistSq) continue;
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist; const nz = dz / dist;
            const v1x = p1.velocity.x; const v1z = p1.velocity.z;
            const v2x = p2.velocity.x; const v2z = p2.velocity.z;
            const dot = (v1x - v2x) * nx + (v1z - v2z) * nz;
            if (dot > 0) continue;
            const impulse = -dot * 2.8;
            const lift = 5.5 + Math.abs(dot) * 1.3;
            p1.velocity.x += nx * impulse * 1.0; p1.velocity.z += nz * impulse * 1.0;
            p2.velocity.x -= nx * impulse * 1.0; p2.velocity.z -= nz * impulse * 1.0;
            p1.velocity.y += lift; p2.velocity.y += lift;
            p1.angularVelocity.set(nz * 15, 0, -nx * 15);
            p2.angularVelocity.set(-nz * 15, 0, nx * 15);
            if (p1.isStanding) p1.isStanding = false;
            if (p2.isStanding) p2.isStanding = false;
            const overlap = (p1.radius + p2.radius) - dist + 0.15;
            p1.group.position.x += nx * overlap * 0.7; p1.group.position.z += nz * overlap * 0.7;
            p2.group.position.x -= nx * overlap * 0.7; p2.group.position.z -= nz * overlap * 0.7;
        }
    }
}

function updatePins(delta) {
    for (let pin of pins) {
        if (!pin.isStanding) {
            pin.velocity.y -= 48 * delta;
            pin.group.position.addScaledVector(pin.velocity, delta * 32);
            pin.group.rotation.x += pin.angularVelocity.x * delta * 14;
            pin.group.rotation.z += pin.angularVelocity.z * delta * 14;
            const maxTip = Math.PI / 2;
            if (Math.abs(pin.velocity.x) < 0.15 && Math.abs(pin.velocity.z) < 0.15 && Math.abs(pin.velocity.y) < 0.5) {
                if (pin.group.rotation.x > maxTip) pin.group.rotation.x = maxTip;
                if (pin.group.rotation.x < -maxTip) pin.group.rotation.x = -maxTip;
                if (pin.group.rotation.z > maxTip) pin.group.rotation.z = maxTip;
                if (pin.group.rotation.z < -maxTip) pin.group.rotation.z = -maxTip;
            }
            pin.velocity.multiplyScalar(0.935);
            pin.angularVelocity.multiplyScalar(0.89);
            if (pin.group.position.y < PIN_LAY_HEIGHT) {
                pin.group.position.y = PIN_LAY_HEIGHT;
                pin.velocity.y = Math.abs(pin.velocity.y) * 0.65;
                pin.velocity.x *= 0.75;
                pin.velocity.z *= 0.75;
                if (pin.velocity.y < 0.2) pin.velocity.y = 0;
            }
            if (pin.group.position.x < -13) { pin.group.position.x = -13; pin.velocity.x = Math.abs(pin.velocity.x) * 0.6; }
            if (pin.group.position.x > 13) { pin.group.position.x = 13; pin.velocity.x = -Math.abs(pin.velocity.x) * 0.6; }
            if (pin.group.position.z < -230 - laneExtension) { pin.group.position.z = -230 - laneExtension; pin.velocity.z = Math.abs(pin.velocity.z) * 0.6; }
            if (pin.group.position.z > -195 - laneExtension) { pin.group.position.z = -195 - laneExtension; pin.velocity.z = -Math.abs(pin.velocity.z) * 0.6; }
            if (pin.group.position.y > 18) { pin.group.position.y = 18; pin.velocity.y = -Math.abs(pin.velocity.y) * 0.4; }
        }
    }
}

function updateSpinTicker() {
    const tickerSpeed = 1.8 * (11 - currentBall.control) / 5;
    spinPhase += tickerSpeed * 0.016;
    const percent = (Math.sin(spinPhase) + 1) * 50;
    spinIndicator.style.left = percent + '%';
}

let lastTime = Date.now();
let lightProgress = 0;

function updateAimLine() {
    if (mainAimBar) mainAimBar.visible = true;
    highlights.forEach(h => { if (h) h.visible = true; });
    const pullDistance = Math.max(0, ballMesh.position.z - 23);
    const power = 3.4 + pullDistance * 0.1;
    const baseVx = ballMesh.position.x * 0.0085 + Math.sin(aimAngle) * 3.8;
    const baseVz = -power;
    const projectionDistance = 100;
    const steps = 65;
    const points = [];
    const dirScale = projectionDistance / Math.abs(baseVz);
    for (let i = 0; i < steps; i++) {
        const t = i / (steps - 1);
        let x = ballMesh.position.x + t * baseVx * dirScale;
        x = Math.max(-12.8, Math.min(12.8, x));
        const z = ballMesh.position.z + t * baseVz * dirScale;
        points.push(new THREE.Vector3(x, ballMesh.position.y + 0.02, z));
    }
    if (mainAimBar) scene.remove(mainAimBar);
    const curve = new THREE.CatmullRomCurve3(points);
    const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.85, 8, false);
    mainAimBar = new THREE.Mesh(tubeGeo, aimBarMaterial);
    scene.add(mainAimBar);
    const baseSpeed = 1.6;
    for (let k = 0; k < highlights.length; k++) {
        const offset = k * 0.16;
        const headT = ((lightProgress + offset) % baseSpeed) / baseSpeed;
        let highlightX = ballMesh.position.x + headT * baseVx * dirScale * 0.98;
        highlightX = Math.max(-12.8, Math.min(12.8, highlightX));
        const highlightZ = ballMesh.position.z + headT * baseVz * dirScale * 0.98;
        highlights[k].position.set(highlightX, ballMesh.position.y + 0.08, highlightZ);
        highlights[k].scale.setScalar(1.35);
    }
    lightProgress += 0.007;
}

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now();
    let delta = (now - lastTime) / 1000 || 0.016;
    lastTime = now;
    if (delta > 0.1) delta = 0.1;
    accumulator += delta;
    while (accumulator >= FIXED_TIMESTEP) {
        if (gameOver) { accumulator -= FIXED_TIMESTEP; continue; }
        if (isRolling) {
            const speed = ballVelocity.length();
            ballMesh.rotation.x -= speed * 0.095;
            ballMesh.rotation.z = -ballVelocity.x * 0.75;
            let hookFactor = 0;
            if (ballMesh.position.z < HOOK_START_Z) hookFactor = Math.min(1.0, (HOOK_START_Z - ballMesh.position.z) / 45);
            ballVelocity.x += spinAtRelease * FIXED_TIMESTEP * 2.8 * hookFactor;
            ballVelocity.multiplyScalar(FRICTION_BASE);
            ballMesh.position.add(ballVelocity.clone().multiplyScalar(FIXED_TIMESTEP * 24));
            if (!inGutter && Math.abs(ballMesh.position.x) > 12.5) inGutter = true;
            if (inGutter) {
                const targetGutterX = ballMesh.position.x > 0 ? 15.75 : -15.75;
                ballMesh.position.x = ballMesh.position.x * 0.85 + targetGutterX * 0.15;
                ballMesh.position.y = Math.max(GUTTER_BALL_Y +3.8, ballMesh.position.y - 0.25);
                ballVelocity.z *= 0.9985;
                ballVelocity.x *= 0.15;
            } else {
                ballMesh.position.y = LANE_TOP_Y;
            }
            if (!goingToCollector && (hasHitPins || ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < (inGutter ? GUTTER_END_Z - 60 : LANE_END_Z + 35))) {
                goingToCollector = true;
                ballVelocity.z = -Math.abs(ballVelocity.z) * 0.48;
            }
            if (goingToCollector) {
                ballVelocity.z *= 1.0;
                if (ballMesh.position.z < COLLECTOR_Z - 5) {
                    ballMesh.position.y = Math.max(-8.8, ballMesh.position.y -2.8);
                    ballVelocity.set(0, 0, 0);
                    if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 800);
                }
            }
            if (ballMesh.position.z < -235 - laneExtension) {
                ballMesh.position.y = Math.max(GUTTER_BALL_Y, ballMesh.position.y - 0.35);
                if (!inGutter) { ballVelocity.z *= 0.79; ballVelocity.x *= 0.62; } else { ballVelocity.z *= 0.985; }
            }
            checkBallPinCollisions();
            updatePins(FIXED_TIMESTEP);
            for (let i = 0; i < PIN_COLLISION_SUBSTEPS; i++) checkPinPinCollisions();
            const endZ = inGutter ? GUTTER_END_Z : LANE_END_Z;
            if (!hasHitPins && (ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < endZ)) {
                if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 1800);
            }
        }
        accumulator -= FIXED_TIMESTEP;
    }

    if (!isRolling && !gameOver) {
        updateSpinTicker();
        updateAimLine();
        if (!fullView) { camera.position.set(0, 26, 85); camera.lookAt(0, 14, 20); }
        else { camera.position.set(0, 140, 220); camera.lookAt(0, 0, -80); }
        if (keys['ArrowLeft']) aimAngle -= 0.012;
        if (keys['ArrowRight']) aimAngle += 0.012;
        aimAngle = Math.max(-0.7, Math.min(0.7, aimAngle));
    }

    if (isRolling && ballMesh.position.z < -140) {
        camera.position.x = camera.position.x * 0.85 + ballMesh.position.x * 0.15;
        camera.position.y = 12;
        camera.position.z = camera.position.z * 0.88 + (-152 - laneExtension / 2) * 0.12;
        camera.lookAt(0, 2, -205 - laneExtension);
        if (ballMesh.position.y > 1.2) ballMesh.position.y = 1.2;
    } else if (isRolling) {
        const targetCameraZ = ballMesh.position.z + 62;
        camera.position.z = camera.position.z * 0.82 + targetCameraZ * 0.18;
        camera.position.y = 36;
        camera.position.x = ballMesh.position.x * 0.3;
        camera.lookAt(ballMesh.position.x * 0.3, 14, ballMesh.position.z - 55);
    }

    renderer.render(scene, camera);
}

dom.addEventListener('mousedown', e => { 
    if (isRolling || gameOver || !timerHasStarted) return; 
    isDragging = true; 
    dragStartMouse.set(e.clientX, e.clientY); 
    dragStartBallPos.copy(ballMesh.position); 
});
dom.addEventListener('mousemove', e => { 
    if (!isDragging) return; 
    const deltaX = (e.clientX - dragStartMouse.x) * 0.14; 
    const deltaZ = (e.clientY - dragStartMouse.y) * 0.085; 
    ballMesh.position.x = dragStartBallPos.x + deltaX; 
    ballMesh.position.z = dragStartBallPos.z + deltaZ; 
    ballMesh.position.x = Math.max(-11.5, Math.min(11.5, ballMesh.position.x)); 
    ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z)); 
});
dom.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; launchBall(); } });

dom.addEventListener('touchstart', e => { 
    if (isRolling || gameOver || !e.touches.length || !timerHasStarted) return; 
    e.preventDefault(); 
    isDragging = true; 
    const t = e.touches[0]; 
    dragStartMouse.set(t.clientX, t.clientY); 
    dragStartBallPos.copy(ballMesh.position); 
});
dom.addEventListener('touchmove', e => { 
    if (!isDragging) return; 
    e.preventDefault(); 
    const t = e.touches[0]; 
    const deltaX = (t.clientX - dragStartMouse.x) * 0.14; 
    const deltaZ = (t.clientY - dragStartMouse.y) * 0.085; 
    ballMesh.position.x = dragStartBallPos.x + deltaX; 
    ballMesh.position.z = dragStartBallPos.z + deltaZ; 
    ballMesh.position.x = Math.max(-8.5, Math.min(8.5, ballMesh.position.x)); 
    ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z)); 
});
dom.addEventListener('touchend', () => { if (isDragging) { isDragging = false; launchBall(); } });

dom.addEventListener('mousedown', e => {
    if (isRolling || gameOver) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(previewBalls);
    if (intersects.length > 0) {
        currentBall = intersects[0].object.userData.ballData;
        document.getElementById('currentBallName').textContent = currentBall.name;
        createBallMesh();
    }
});

window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key.toLowerCase() === 'r' && !isRolling && !gameOver) resetBallAndTimer();
    if (e.key.toLowerCase() === 'v') fullView = !fullView;
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('playAgain').addEventListener('click', newGame);

createPreviewBalls();
createAimHighlights();
createBallMesh();

animate();

window.addEventListener('load', () => {
    resetPins();
    rollsInCurrentFrame = 0;
    currentFrame = 1;
    isFinalFrame = false;
    allRolls = [];
    frameRolls = [[], [], []];
    gameOver = false;
    updateScoreboard();
    startNewRoll();
});
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
