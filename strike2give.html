<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strike2Give - PvP Bowling</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.85)), 
                  url('https://grind2give.org/g2gstrike.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 20px 100px;
    }

    h1 {
      font-size: clamp(3.2rem, 10vw, 5.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: clamp(1.6rem, 5.5vw, 2.4rem);
      font-weight: 700;
      color: #00ffaa;
      margin-bottom: 25px;
    }

    .description {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      max-width: 820px;
      margin: 0 auto 50px;
      line-height: 1.65;
    }

    .btn {
      display: inline-block;
      padding: 20px 60px;
      font-size: clamp(1.3rem, 4vw, 1.7rem);
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      margin: 12px;
      transition: all 0.4s;
      min-width: 260px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      color: #000;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(0,255,170,0.8);
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Strike2Give</h1>
    <p class="tagline">Strike2Give… And Get! 🎳</p>
    <p class="description">
      Competitive PvP Bowling • Battle players worldwide<br>
      Earn real $G2G rewards through daily logins and winning matches
    </p>
    
    <div>
      <a href="https://forms.gle/v5ByeQrqUFvn4qEE7" 
         target="_blank" 
         class="btn btn-primary">
        Join Waitlist → Early Access
      </a>
      
      <a href="/how-to-buy.html" class="btn btn-primary">
        Buy $G2G
      </a>
    </div>
  </div>

  <footer style="padding:60px 20px; background:#000; color:#666;">
    Strike2Give — Part of the Grind2Give Ecosystem 💚
  </footer>

</body>
</html>
