<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strike2Give Bowling - P2E PvP • 3 Frames (Fix 198)</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/intro-rust');
        * { font-family: 'intro rust', sans-serif; color: #5eff00; }
        body { 
            margin:0; padding:0; overflow:hidden; 
            background: url('strike2givetop.png') no-repeat center center fixed; 
            background-size: cover; 
            background-color: #0f172a; 
            touch-action:none; 
        }
        canvas { display:block; width:100% !important; height:100vh !important; }

        #info { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.75); padding:12px; border-radius:8px; z-index:100; font-size:14px; }

        #scoreboardPanel {
            position:absolute; top:40px; left:50%; transform:translateX(-50%);
            background:linear-gradient(#111827,#1e2937); border:3px solid #5eff00; border-radius:14px;
            padding:8px 16px; box-shadow:0 0 14px #5eff00; z-index:180; display:flex; flex-direction:row;
            align-items:center; gap:12px; max-width:92%;
        }
        #scoreboard { display:flex; gap:12px; align-items:center; }
        .frame { text-align:center; min-width:62px; padding:4px; border-radius:8px; transition:all 0.3s; }
        .frame.active { background:#000000; box-shadow:0 0 12px #ffffff; border:2px solid #5eff00; color:#000; }
        .frameNum { font-size:34px; font-weight:900; color:#ffffff; margin-bottom:4px; text-shadow:0 0 10px #5eff00; line-height:1; }
        .rolls { font-size:22px; height:28px; display:flex; justify-content:center; gap:6px; align-items:center; }
        .rollBox { background:#5eff00; color:#000; padding:6px 10px; border-radius:6px; min-width:26px; font-weight:900; font-size:22px; box-shadow:0 0 6px #000; }
        .rollBox.pop { animation: popIn 0.5s cubic-bezier(0.68,-0.55,0.27,1.55); }
        .score { font-size:28px; font-weight:900; color:#5eff00; margin-top:4px; text-shadow:0 0 10px #5eff00; min-height:30px; line-height:1; }
        .score.pop { animation: popIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55); }

        #timer { position:absolute; top:85px; left:20px; font-size:20px; font-weight:bold; text-shadow:0 0 15px #000;
            background:rgba(0,0,0,0.6); padding:8px 30px; border-radius:12px; box-shadow:0 0 18px #5eff00; min-width:20px; text-align:center; z-index:190; }

        #coinPanel { position:absolute; top:170px; right:20px; background:linear-gradient(#111827,#1e2937); border:4px solid #00ffcc; border-radius:18px; padding:10px 20px; box-shadow:0 0 18px #00ffcc; z-index:180; display:flex; flex-direction:column; align-items:flex-end; font-size:14px; text-align:right; }

        #ballPositionDebug { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); font-size:14px; font-weight:bold;
            padding:6px 18px; border-radius:30px; z-index:200; white-space:nowrap; box-shadow:0 0 12px #00ffcc; display:flex; gap:12px; align-items:center; }

        #hookController { position:absolute; bottom:25px; left:50%; transform:translateX(-50%); width:92%; max-width:460px; height:68px; background:rgba(0,0,0,0.9); border:8px solid #00ffcc;
            border-radius:18px; z-index:300; overflow:hidden; box-shadow:0 0 30px #00ffcc; display:none; }
        #hookBar { position:relative; width:100%; height:100%;
            background: linear-gradient(to right, #ff2222 0%, #ff2222 12%, #aa44ff 12%, #aa44ff 27%, #3399ff 27%, #3399ff 42%,
                #5eff00 42%, #5eff00 58%, #3399ff 58%, #3399ff 73%, #aa44ff 73%, #aa44ff 88%, #ff2222 88%, #ff2222 100%); }
        .hookTick { position:absolute; top:4px; bottom:4px; width:3px; background:rgba(255,255,255,0.9); box-shadow:0 0 10px #ffffff; z-index:2; }
        #hookPointer { position:absolute; top:50%; transform:translate(-50%,-50%); width:42px; height:42px; background:#ffffff; border:5px solid #222; border-radius:50%;
            box-shadow:0 0 25px #ffffff, 0 0 45px #00ffcc; z-index:10; }
        .hookLabel { position:absolute; bottom:-26px; font-size:14px; font-weight:bold; }

        #aimSensitivityControl { position:absolute; top:85px; right:20px; background:rgba(0,0,0,0.8); padding:8px 16px; border-radius:30px; z-index:500; display:none; }
        #aimSensitivityControl label { font-size:13px; margin-right:8px; }

        @keyframes sweepInFromRight { 0% { transform: translateX(120%) rotate(12deg); opacity:0; } 100% { transform: translateX(-50%) rotate(0deg); opacity:1; } }
        @keyframes flipOutToLeft { 0% { transform: translateX(-50%) rotate(0deg); opacity:1; } 100% { transform: translateX(-220%) rotate(-25deg); opacity:0; } }
        #scoreboardPanel.sweepIn { animation: sweepInFromRight 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        #scoreboardPanel.flipOut { animation: flipOutToLeft 0.7s cubic-bezier(0.4,0,1,1) forwards; }
        @keyframes popIn { 0% { transform: scale(0.3); opacity:0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity:1; } }

        #foul { position:absolute; top:42%; left:50%; transform:translate(-50%, -50%); font-size:110px; font-weight:900; color:#ff2222; text-shadow:0 0 35px #ff0000, 0 0 70px #ff0000; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.4s ease; white-space:nowrap; }
        #pinResult, #timeUp { position:absolute; top:38%; left:50%; transform:translate(-50%, -50%); font-size:78px; font-weight:900; color:#5eff00; text-shadow: none;
            z-index:310; opacity:0; pointer-events:none; white-space:nowrap; transition:all 0.4s ease; }

        #gameOverDisplay { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); font-size:90px; font-weight:900; color:#ff4444; text-shadow:0 0 30px #000, 0 0 60px #ff0000; z-index:300; white-space:nowrap; opacity:0; transition:all 0.8s cubic-bezier(0.68,-0.55,0.27,1.55); }
        #gameOverDisplay.show { bottom:220px; opacity:1; }

        #startButton { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); background:#5eff00; color:#000; font-size:28px; font-weight:900; padding:12px 40px;
            border-radius:50px; box-shadow:0 0 25px #5eff00; z-index:400; cursor:pointer; white-space:nowrap; display:none; }
        #playAgain { display:none; position:absolute; bottom:40px; left:50%; transform:translateX(-50%); background:#5eff00; color:#000; font-size:42px; padding:18px 60px; border-radius:50px;
            box-shadow:0 0 40px #ffcc00; z-index:400; cursor:pointer; }

        #testBanner { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:linear-gradient(#ff2222, #cc0000); color:#fff; font-size:20px; font-weight:bold;
            padding:4px 20px; border-radius:30px; box-shadow:0 0 15px #ff0000; z-index:200; letter-spacing:1.5px; white-space:nowrap; }

        #remainingPins { position:absolute; top:125px; right:20px; z-index:250; background:rgba(17,24,39,0.85); border:3px solid #5eff00; border-radius:16px;
            padding:12px 18px; box-shadow:0 0 22px #5eff00; display:none; }

        #gameOverPopup { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:linear-gradient(#111827, #1e2937); border:8px solid #ff4444;
            border-radius:24px; padding:40px 50px; box-shadow:0 0 80px #ff0000, 0 0 40px #000; z-index:600; display:none; text-align:center; max-width:460px; width:92%;
            animation: popupPop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        #gameOverPopup h1 { font-size:68px; color:#ff4444; margin:0 0 15px 0; text-shadow:0 0 25px #ff0000; }
        .popupScore { font-size:32px; margin:20px 0 8px; }
        #finalScoreBig { font-size:82px; font-weight:900; margin-bottom:30px; }
        .popupCoins { font-size:26px; margin:15px 0; }
        #popupPlayAgain { background:#5eff00; color:#000; font-size:42px; font-weight:900; padding:18px 70px; border-radius:60px; margin-top:30px; cursor:pointer;
            box-shadow:0 0 40px #ffcc00; display:inline-block; }

        @keyframes popupPop { 0% { transform: translate(-50%, -50%) scale(0.6); opacity:0; } 100% { transform: translate(-50%, -50%) scale(1); opacity:1; } }

        #readySetFly { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:110px; font-weight:900; color:#5eff00; text-shadow: none;
            z-index:999; white-space:nowrap; opacity:0; display:none; pointer-events:none; transition:none; }
        #readySetFly.show { animation: flyAcross 3.4s ease-in-out forwards; }
        @keyframes flyAcross { 0% { transform:translate(-50%, -50%) scale(0.8); opacity:0; } 12% { transform:translate(-50%, -50%) scale(1.1); opacity:1; } 32% { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            36% { transform:translate(-50%, -50%) scale(0.9); opacity:0; } 40% { transform:translate(-50%, -50%) scale(1.1); opacity:1; } 60% { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            64% { transform:translate(-50%, -50%) scale(0.9); opacity:0; } 68% { transform:translate(-50%, -50%) scale(1.1); opacity:1; } 88% { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            100% { transform:translate(-50%, -50%) scale(0.8); opacity:0; } }

        #ballSelectPopup { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:linear-gradient(#111827, #1e2937); border:8px solid #5eff00;
            border-radius:24px; padding:30px 40px; z-index:800; width:92%; max-width:560px; box-shadow:0 0 80px #5eff00; display:none; text-align:center; }

        .ballGrid { display:grid; grid-template-columns:repeat(2, 1fr); gap:18px; margin-top:20px; }
        .ballCard { background:rgba(255,255,255,0.08); border:4px solid #222; border-radius:18px; padding:14px; cursor:pointer; transition:all 0.3s; }
        .ballCard:hover { border-color:#5eff00; transform:scale(1.05); }
        .ballCard.selected { border-color:#5eff00; box-shadow:0 0 25px #5eff00; }
        .ballIcon { width:68px; height:68px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:0 0 20px #000; }
        .ballName { font-size:20px; font-weight:900; margin-bottom:8px; }
        .ballStats { font-size:15px; line-height:1.4; text-align:left; }

        #closeBallPopup { position:absolute; top:12px; right:18px; font-size:28px; color:#ff4444; cursor:pointer; }

        /* PHONE OPTIMIZATIONS */
        @media (max-width: 480px) {
            body { background-size: cover; background-position: center top; }
            #gameOverPopup { width: 88%; padding: 15px 20px; }
            #gameOverPopup h1 { font-size: 32px; }
            #finalScoreBig { font-size: 25px; }
            #coinPanel { top: 125px; left: 50%; right: auto; transform: translateX(-50%); font-size: 12px; padding: 6px 14px; }
            #aimSensitivityControl { display: flex; align-items: center; }
        }
    </style>
</head>
<body>

<div id="info">Strike2Give Bowling<br>P2E PvP • 3 Frames (Fix 198)</div>

<div id="scoreboardPanel">
    <div id="scoreboard">
        <div class="frame" id="frameContainer1"><div class="frameNum">1</div><div class="rolls" id="frame1"></div><div class="score" id="score1"></div></div>
        <div class="frame" id="frameContainer2"><div class="frameNum">2</div><div class="rolls" id="frame2"></div><div class="score" id="score2"></div></div>
        <div class="frame" id="frameContainer3"><div class="frameNum">3</div><div class="rolls" id="frame3"></div><div class="score" id="score3"></div></div>
        <div style="font-size:32px; color:#5eff00; font-weight:900; margin-left:20px; line-height:1;">TOTAL<br><span id="totalScore" style="font-size:48px;color:#5eff00;">0</span></div>
    </div>
</div>

<div id="timer">25</div>

<div id="coinPanel">
    <div>G-COINS <span id="gCoinsDisplay">1250</span></div>

    <label>AIM SPEED</label>
    <input type="range" id="aimSlider" min="0.04" max="0.15" step="0.005" value="0.065" style="width:140px;">
    <span id="aimValue" style="font-size:13px; margin-left:6px;">0.065</span>
</div>

<div id="testBanner">TEST ONLY - NOT LIVE NOT BETA</div>
<div id="remainingPins"><svg id="pinDiagram" viewBox="0 0 220 195" xmlns="http://www.w3.org/2000/svg"></svg></div>

<div id="hookController">
    <div id="hookBar">
        <div class="hookTick" style="left:15%"></div>
        <div class="hookTick" style="left:30%"></div>
        <div class="hookTick" style="left:45%"></div>
        <div class="hookTick" style="left:55%"></div>
        <div class="hookTick" style="left:70%"></div>
        <div class="hookTick" style="left:85%"></div>
        <div id="hookPointer"></div>
    </div>
    <div class="hookLabel" id="hookLeft">HOOK LEFT</div>
    <div class="hookLabel" id="hookStraight">STRAIGHT</div>
    <div class="hookLabel" id="hookRight">HOOK RIGHT</div>
</div>

<div id="foul">FOUL!</div>
<div id="pinResult"></div>
<div id="timeUp"></div>
<div id="gameOverDisplay">GAME OVER</div>
<div id="startButton">START BOWLING</div>
<div id="playAgain">PLAY AGAIN</div>

<div id="gameOverPopup">
    <h1>GAME OVER</h1>
    <div class="popupScore">FINAL SCORE</div>
    <div id="finalScoreBig">0</div>
    <div class="popupCoins">COINS EARNED: <span id="coinsEarnedDisplay" style="font-size:32px;">+0</span> G-COINS</div>
    <div id="popupPlayAgain">PLAY AGAIN</div>
</div>

<div id="readySetFly"></div>

<div id="ballSelectPopup">
    <div id="closeBallPopup">✕</div>
    <h2 style="margin:0 0 10px 0; font-size:32px;">CHOOSE YOUR BALL</h2>
    <div id="ballGrid" class="ballGrid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
console.log("%c✅ PHASE 3 FIX 198 — White Precision ball lifted higher (no more sinking)", "color:#00ffcc;font-size:18px;font-weight:bold");

// =============================================
// YELLOW AIM BAR SENSITIVITY — EDIT HERE
// =============================================
let AIM_POSITION_SENSITIVITY = 0.0065;

const ballRadiusBase = 2.05;

// PHYSICS
const PHYSICS = {
    POWER_BASE: 3.4,
    POWER_PULL_SCALE: 0.14,
    CONTROL_SWING_DAMPEN: 1.75,
    SPIN_STRENGTH: 1.25,
    BASE_VX_FACTOR: 0.0085,
    AIM_ANGLE_MAX: 3.8,
    HOOK_START_Z: -115,
    FRICTION_BASE: 0.99995,
    MIN_VELOCITY: 0.003
};

const BALL_TYPES = [
    {name: "Green Power",   color: 0x00ff00, power: 15, control: 15, bounce: 4, spin: 7, radius: ballRadiusBase},
    {name: "White Precision", color: 0xffffff, power: 4, control: 15, bounce: 3, spin: 7, radius: ballRadiusBase * 1.5},
    {name: "Red Spin",      color: 0xff0000, power: 7, control: 15, bounce: 4, spin: 15, radius: ballRadiusBase},
    {name: "Black Bounce",  color: 0x111111, power: 4, control: 15, bounce: 15, spin: 7, radius: ballRadiusBase}
];

let currentBallIndex = 0;
let currentBall = BALL_TYPES[0];

let gCoins = 1250;
let g2gCoins = 45;

let allRolls = [];
let frameRolls = [[], [], []];
let currentFrame = 1;
const MAX_FRAMES = 3;
let rollsInCurrentFrame = 0;
let pinsStandingAtStartOfRoll = 10;
let gameOver = false;
let isFinalFrame = false;

const strikeMessages = ["STRIKE 🔥", "BOOM 💥", "FIRE 🚀", "LEGEND 💪"];
const spareMessages = ["SPARE 🔥", "CLEAN 💪"];
const missMessages = ["MISS 😞", "CLOSE ⚠️"];
const gutterMessage = "GUTTER 😟";

const MIN_PULL_Z = 25.08;
const MAX_PULL_Z = 40;
const laneExtension = 85;

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 4000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xdddddd, 0.7));
const hemiLight = new THREE.HemisphereLight(0xaaaaaa, 0x444444, 0.9);
hemiLight.position.set(0, 50, 0);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(30, 80, 60);
scene.add(dirLight);

const seamZ = 20;
const foulDetectionZ = 19.30;
const LANE_TOP_Y = 0.5;

const lighterWood = 0x8B5A2B;
const darkerWood = 0x6B3E2A;
const numPlanks = 15;
const plankWidth = 26 / numPlanks;

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.2, 300 + laneExtension), new THREE.MeshLambertMaterial({ color }));
    const x = -13 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.5, -80 - laneExtension / 2);
    scene.add(plank);
}

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 25), new THREE.MeshLambertMaterial({ color }));
    const x = -13 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.45, seamZ + 12.5); scene.add(plank);
}

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 30), new THREE.MeshLambertMaterial({ color }));
    const x = -13 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.45, seamZ + 37.5); scene.add(plank);
}

const foulLine = new THREE.Mesh(new THREE.BoxGeometry(28, .25, .15), new THREE.MeshLambertMaterial({ color: 0xFF0000 }));
foulLine.position.set(0, 0.12, seamZ - 9.5); scene.add(foulLine);

const pinPositions = [
    [0, -198 - laneExtension],
    [-3.85, -204 - laneExtension], [3.85, -204 - laneExtension],
    [-7.7, -210 - laneExtension], [0, -210 - laneExtension], [7.7, -210 - laneExtension],
    [-11.55, -216 - laneExtension], [-3.85, -216 - laneExtension], [3.85, -216 - laneExtension], [11.55, -216 - laneExtension]
];

const pinDotMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
pinPositions.forEach(pos => {
    const dot = new THREE.Mesh(new THREE.CircleGeometry(0.45, 16), pinDotMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(pos[0], 0.32, pos[1]);
    scene.add(dot);
});

const dotMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const darkPlankIndices = [2, 3.9, 5.8, 9.5, 11.4, 13.3];
darkPlankIndices.forEach(i => {
    const leftX = -13 + i * plankWidth + .35;
    const rightX = -13 + i * plankWidth - .95;
    const leftDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
    leftDot.rotation.x = -Math.PI / 2; leftDot.position.set(leftX, 0.3, 12); scene.add(leftDot);
    const rightDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
    rightDot.rotation.x = -Math.PI / 2; rightDot.position.set(rightX, 0.3, 12); scene.add(rightDot);
});

const approachPlankIndices = [1.85,3.80,5.75,7.7,9.65,11.55,13.3];
const approachDotZ = seamZ + 4;
approachPlankIndices.forEach(i => {
    const centerX = -13 + (i-.1) * plankWidth;
    const radius = (i === 10) ? 0.50 : 0.32;
    const dot = new THREE.Mesh(new THREE.CircleGeometry(radius, 25), dotMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(centerX, 0.1, approachDotZ); scene.add(dot);
});

const arrowMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
function createArrow(x, z) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, -1.35,-3.2,0, 1.35,-3.2,0]), 3));
    const arrow = new THREE.Mesh(geo, arrowMat);
    arrow.position.set(x, 0.48, z);
    arrow.rotation.x = -Math.PI / 2;
    scene.add(arrow);
}
const darkCenters = [1.75, 3.5, 5.5, 7.25, 9.15, 11, 12.9].map(i => -13 + (i + .25) * plankWidth);
createArrow(darkCenters[3], -110);
createArrow(darkCenters[2], -100);
createArrow(darkCenters[4], -100);
createArrow(darkCenters[1], -90);
createArrow(darkCenters[5], -90);
createArrow(darkCenters[0], -80);
createArrow(darkCenters[6], -80);

let pins = [];
function createPin(x, z, index) {
    const h = 2;
    const w = 1;
    const group = new THREE.Group();
    const lowerBody = new THREE.Mesh(new THREE.CylinderGeometry(1.38 * w, 1.62 * w, 3.1 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    lowerBody.position.y = 2.05 * h; group.add(lowerBody);
    const upperBody = new THREE.Mesh(new THREE.CylinderGeometry(1.62 * w, 0.78 * w, 2.4 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    upperBody.position.y = 4.55 * h; group.add(upperBody);
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(1.65 * w, 1.65 * w, 0.48 * h, 48), new THREE.MeshPhongMaterial({ color: 0xFF0000, shininess: 20, emissive: 0x440000, emissiveIntensity: 0.3 }));
    stripe.position.y = 3.55 * h; group.add(stripe);
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.48 * w, 0.78 * w, 1.15 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    neck.position.y = 6.35 * h; group.add(neck);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.68 * w, 48, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 30, emissive: 0x222222, emissiveIntensity: 0.18 }));

function getCurrentScore() {
    let score = 0; let rollIndex = 0;
    for (let frame = 0; frame < MAX_FRAMES; frame++) {
        if (rollIndex >= allRolls.length) break;
        const roll1 = allRolls[rollIndex];
        if (roll1 === 10) {
            score += 10;
            if (rollIndex + 1 < allRolls.length) score += allRolls[rollIndex + 1];
            if (rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 1;
        } else {
            const roll2 = allRolls[rollIndex + 1] || 0;
            const sum = roll1 + roll2;
            score += sum;
            if (sum === 10 && rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 2;
        }
    }
    return score;
}

function updateScoreboard() {
    document.getElementById('totalScore').textContent = getCurrentScore();

    for (let f = 1; f <= 3; f++) {
        const rollsDiv = document.getElementById('frame' + f);
        const frameData = frameRolls[f-1] || [];
        let html = '';
        if (frameData.length > 0) {
            for (let i = 0; i < frameData.length; i++) {
                const r = frameData[i];
                let boxHTML = '';
                if (r === 10) boxHTML = `<div class="rollBox pop">X</div>`;
                else if (i === 1 && frameData[0] + r === 10 && frameData[0] !== 10) boxHTML = `<div class="rollBox pop">/</div>`;
                else boxHTML = `<div class="rollBox pop">${r}</div>`;
                html += boxHTML;
            }
        }
        rollsDiv.innerHTML = html;
        let frameTotal = '';
        const isComplete = (f < currentFrame) || (rollsInCurrentFrame === 2) || (frameData[0] === 10 && rollsInCurrentFrame === 1) || (f === 3 && frameData.length > 0);
        if (isComplete) {
            let frameScore = 0;
            if (frameData.length > 0) {
                const roll1 = frameData[0];
                if (roll1 === 10) {
                    frameScore = 10;
                    const idx = allRolls.indexOf(roll1);
                    if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    if (idx + 2 < allRolls.length) frameScore += allRolls[idx + 2] || 0;
                } else {
                    const roll2 = frameData[1] || 0;
                    frameScore = roll1 + roll2;
                    if (roll1 + roll2 === 10) {
                        const idx = allRolls.indexOf(roll2);
                        if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    }
                }
            }
            runningTotal += frameScore;
            frameTotal = runningTotal;
        }
        const scoreEl = document.getElementById('score' + f);
        scoreEl.textContent = frameTotal;
        scoreEl.classList.add('pop');
        setTimeout(() => scoreEl.classList.remove('pop'), 600);
    }
    document.querySelectorAll('.frame').forEach((f, i) => f.classList.toggle('active', i + 1 === currentFrame));
    triggerScoreboardSweep();
}

function getSplitMessage() {
    const standing = pins.filter(p => p.isStanding).map(p => p.index + 1);
    if (standing.length < 2) return "";
    const sorted = [...standing].sort((a,b)=>a-b);

    if (sorted.includes(7) && sorted.includes(10) && sorted.length === 2) return "7-10 SPLIT!";
    if (sorted.includes(4) && sorted.includes(6) && sorted.length === 2) return "4-6 SPLIT!";
    if (sorted.includes(7) && sorted.includes(9) && sorted.length === 2) return "7-9 SPLIT!";
    if (sorted.includes(4) && sorted.includes(10) && sorted.length === 2) return "4-10 SPLIT!";
    if (sorted.includes(6) && sorted.includes(7) && sorted.length === 2) return "6-7 SPLIT!";
    if (sorted.includes(4) && sorted.includes(7) && sorted.length === 2) return "4-7 SPLIT!";
    if (sorted.includes(7) && sorted.includes(8) && sorted.includes(9) && sorted.includes(10) && sorted.length === 4) return "7-10 WASHOUT!";
    if (sorted.includes(4) && sorted.includes(6) && sorted.includes(7) && sorted.includes(10) && sorted.length === 4) return "4-6-7-10 SPLIT!";
    if (sorted.includes(1) && sorted.length > 1 && sorted[0] === 1) return "HEAD PIN SPLIT!";
    if (sorted.length >= 2 && (sorted[sorted.length-1] - sorted[0] > 3)) return "BIG SPLIT!";

    return "SPLIT!";
}

function hasGapBetweenPins() {
    const standing = pins.filter(p => p.isStanding);
    if (standing.length < 2) return false;
    const indices = standing.map(p => p.index).sort((a,b) => a - b);
    for (let i = 1; i < indices.length; i++) {
        if (indices[i] - indices[i-1] > 1) return true;
    }
    return false;
}

function finishRoll(knockedThisRoll) {
    allRolls.push(knockedThisRoll);
    frameRolls[currentFrame-1].push(knockedThisRoll);
    rollsInCurrentFrame = frameRolls[currentFrame-1].length;

    let resultText = "";
    let color = "#ffcc00";
    let indicatorMessage = "";

    if (knockedThisRoll === 10 && rollsInCurrentFrame === 1) resultText = getRandom(strikeMessages);
    else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll === 10)) resultText = getRandom(spareMessages);
    else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll < 10)) resultText = getRandom(missMessages);
    else if (knockedThisRoll === 0) { 
        if (!timedOut) {
            resultText = gutterMessage; 
            color = "#ff8800"; 
            indicatorMessage = gutterMessage; 
        }
    }
    else resultText = getRandom(missMessages);

    let advance = false;
    if (!isFinalFrame) {
        if (rollsInCurrentFrame >= 2 || knockedThisRoll === 10) advance = true;
    } else {
        if (rollsInCurrentFrame >= 3) advance = true;
        else if (rollsInCurrentFrame === 2) {
            const first = frameRolls[2][0] || 0;
            const second = frameRolls[2][1] || 0;
            if (!(first === 10 || first + second === 10)) advance = true;
        }
    }

    const nextAction = () => {
        if (advance) advanceToNextFrame();
        else startNewRoll();
    };

    if (rollsInCurrentFrame === 1 && knockedThisRoll < 10) {
        clearFallenPins();
        if (hasGapBetweenPins()) {
            const splitMsg = getSplitMessage();
            showResult(splitMsg, "#ffffff");
        } else {
            updateRemainingPinsVisual(indicatorMessage);
        }
    } else {
        updateRemainingPinsVisual("");
    }

    updateScoreboard();

    if (isFinalFrame) {
        const first = frameRolls[2][0] || 0;
        const second = frameRolls[2][1] || 0;
        if (rollsInCurrentFrame === 1 && knockedThisRoll === 10) resetPins();
        else if (rollsInCurrentFrame === 2) {
            if (first === 10) {
                if (second === 10) resetPins();
            } else if (first + second === 10) {
                resetPins();
            }
        }
    }

    if (resultText) showResult(resultText, color, nextAction);
    else nextAction();
}

function launchBall() {
    if (gameOver || isRolling) return;
    ballLaunchedThisTurn = true;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    timerElement.textContent = "25";
    timerElement.style.color = '#5eff00';
    timerHasStarted = false;
    timedOut = false;

    const pullDistance = Math.max(0, ballMesh.position.z - 23);
    const frontOfBall = ballMesh.position.z - ballRadiusBase;

    if (frontOfBall < foulDetectionZ) {
        foulElement.style.display = 'block';
        foulElement.style.opacity = '1';
        setTimeout(() => { foulElement.style.opacity = '0'; }, 1800);
        ballVelocity.set(ballMesh.position.x * 0.003, 0, -3.5);
        spinAtRelease = 0;
    } else {
        const power = PHYSICS.POWER_BASE + pullDistance * PHYSICS.POWER_PULL_SCALE * (currentBall.power / 10);
        const baseVx = ballMesh.position.x * PHYSICS.BASE_VX_FACTOR + Math.sin(aimAngle) * PHYSICS.AIM_ANGLE_MAX;
        const percent = parseFloat(hookPointerEl.style.left) || 50;
        let normalized = (percent - 50) / 50;
        const distanceFromCenter = Math.abs(normalized);
        const strength = Math.pow(distanceFromCenter, 1.6);
        spinAtRelease = normalized * PHYSICS.SPIN_STRENGTH * (currentBall.spin / 10) * strength;
        ballVelocity.set(baseVx, 0, -power);
    }
    isRolling = true;
    bowlingCrewState = 'positioning';
    hookControllerEl.style.display = 'none';
    if (endRollTimeout) clearTimeout(endRollTimeout);
    endRollTimeout = null;
}

function checkBallPinCollisions() {
    if (!isRolling || ballVelocity.length() < 0.3 || ballMesh.position.z > -175) return;
    const bPos = ballMesh.position;
    const speed = ballVelocity.length();
    for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        if (!pin.isStanding) continue;
        const pPos = pin.group.position;
        const dx = bPos.x - pPos.x;
        const dz = bPos.z - pPos.z;
        const distSq = dx*dx + dz*dz;
        const minDistSq = Math.pow(currentBall.radius + pin.radius, 2);
        if (distSq < minDistSq) {
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist;
            const nz = dz / dist;
            const overlap = (currentBall.radius + pin.radius) - dist + 0.18;
            pPos.x += nx * overlap * 0.85;
            pPos.z += nz * overlap * 0.85;
            const impulse = Math.max(12.5, speed * 2.15);
            const lift = 7.2 + speed * 1.15;
            const spinFactor = 8.8 + speed * 0.95;
            const glancing = Math.abs(nx);
            pin.velocity.set(nx * impulse * 1.32, lift, nz * impulse * 1.28);
            pin.angularVelocity.set(nz * spinFactor * 0.78 * glancing, 0, -nx * spinFactor * 1.25);
            pin.isStanding = false;
            ballVelocity.multiplyScalar(0.53);
            if (!hasHitPins) {
                hasHitPins = true;
                if (endRollTimeout) clearTimeout(endRollTimeout);
                endRollTimeout = setTimeout(endCurrentRoll, 4800);
            }
            return;
        }
    }
}

function checkPinPinCollisions() {
    const sortedPins = [...pins].sort((a, b) => a.index - b.index);
    for (let i = 0; i < sortedPins.length; i++) {
        for (let j = i + 1; j < sortedPins.length; j++) {
            const p1 = sortedPins[i];
            const p2 = sortedPins[j];
            if (!p1.isStanding && !p2.isStanding) continue;
            const dx = p1.group.position.x - p2.group.position.x;
            const dz = p1.group.position.z - p2.group.position.z;
            const distSq = dx*dx + dz*dz;
            const minDistSq = Math.pow(p1.radius + p2.radius, 2);
            if (distSq >= minDistSq) continue;
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist; 
            const nz = dz / dist;
            const v1x = p1.velocity.x; 
            const v1z = p1.velocity.z;
            const v2x = p2.velocity.x; 
            const v2z = p2.velocity.z;
            const dot = (v1x - v2x) * nx + (v1z - v2z) * nz;
            if (dot > 0) continue;
            const impulse = -dot * 2.75;
            const lift = 5.4 + Math.abs(dot) * 1.25;
            p1.velocity.x += nx * impulse * 1.02; 
            p1.velocity.z += nz * impulse * 1.02;
            p2.velocity.x -= nx * impulse * 1.02; 
            p2.velocity.z -= nz * impulse * 1.02;
            p1.velocity.y += lift; 
            p2.velocity.y += lift;
            p1.angularVelocity.set(nz * 14.5, 0, -nx * 14.5);
            p2.angularVelocity.set(-nz * 14.5, 0, nx * 14.5);
            if (p1.isStanding) p1.isStanding = false;
            if (p2.isStanding) p2.isStanding = false;
            const overlap = (p1.radius + p2.radius) - dist + 0.14;
            p1.group.position.x += nx * overlap * 0.72; 
            p1.group.position.z += nz * overlap * 0.72;
            p2.group.position.x -= nx * overlap * 0.72; 
            p2.group.position.z -= nz * overlap * 0.72;
        }
    }
}

function updatePins(delta) {
    for (let pin of pins) {
        if (!pin.isStanding) {
            pin.velocity.y -= 48 * delta;
            pin.group.position.addScaledVector(pin.velocity, delta * 32);
            pin.group.rotation.x += pin.angularVelocity.x * delta * 14;
            pin.group.rotation.z += pin.angularVelocity.z * delta * 14;

            if (Math.abs(pin.velocity.x) < 0.012 && Math.abs(pin.velocity.z) < 0.012 && Math.abs(pin.velocity.y) < 0.4) {
                pin.velocity.set(0, 0, 0);
                pin.angularVelocity.set(0, 0, 0);
            }

            const maxTip = Math.PI / 2;
            if (Math.abs(pin.velocity.x) < 0.08 && Math.abs(pin.velocity.z) < 0.08) {
                if (pin.group.rotation.x > maxTip) pin.group.rotation.x = maxTip;
                if (pin.group.rotation.x < -maxTip) pin.group.rotation.x = -maxTip;
                if (pin.group.rotation.z > maxTip) pin.group.rotation.z = maxTip;
                if (pin.group.rotation.z < -maxTip) pin.group.rotation.z = -maxTip;
            }

            pin.velocity.multiplyScalar(0.932);
            pin.angularVelocity.multiplyScalar(0.885);

            if (pin.group.position.y < 0.70) {
                pin.group.position.y = 0.70;
                pin.velocity.y = Math.abs(pin.velocity.y) * 0.62;
                pin.velocity.x *= 0.73;
                pin.velocity.z *= 0.73;
            }

            if (pin.group.position.x < -13) { pin.group.position.x = -13; pin.velocity.x = Math.abs(pin.velocity.x) * 0.55; }
            if (pin.group.position.x > 13) { pin.group.position.x = 13; pin.velocity.x = -Math.abs(pin.velocity.x) * 0.55; }
            if (pin.group.position.z < -230 - laneExtension) { pin.group.position.z = -230 - laneExtension; pin.velocity.z = Math.abs(pin.velocity.z) * 0.55; }
            if (pin.group.position.z > -195 - laneExtension) { pin.group.position.z = -195 - laneExtension; pin.velocity.z = -Math.abs(pin.velocity.z) * 0.55; }
        }
    }
}

function updateAimLine() {
    if (mainAimBar) mainAimBar.visible = true;
    highlights.forEach(h => { if (h) h.visible = true; });
    const pullDistance = Math.max(0, ballMesh.position.z - 23);
    const power = PHYSICS.POWER_BASE + pullDistance * PHYSICS.POWER_PULL_SCALE * (currentBall.power / 10);
    const baseVx = ballMesh.position.x * PHYSICS.BASE_VX_FACTOR + Math.sin(aimAngle) * PHYSICS.AIM_ANGLE_MAX;
    const baseVz = -power;
    const projectionDistance = 100;
    const steps = 65;
    const points = [];
    const dirScale = projectionDistance / Math.abs(baseVz);
    for (let i = 0; i < steps; i++) {
        const t = i / (steps - 1);
        let x = ballMesh.position.x + t * baseVx * dirScale;
        x = Math.max(-12.8, Math.min(12.8, x));
        const z = ballMesh.position.z + t * baseVz * dirScale;
        points.push(new THREE.Vector3(x, ballMesh.position.y + 0.02, z));
    }
    if (mainAimBar) scene.remove(mainAimBar);
    const curve = new THREE.CatmullRomCurve3(points);
    const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.85, 8, false);
    mainAimBar = new THREE.Mesh(tubeGeo, aimBarMaterial);
    scene.add(mainAimBar);
    const baseSpeed = 1.6;
    for (let k = 0; k < highlights.length; k++) {
        const offset = k * 0.16;
        const headT = ((lightProgress + offset) % baseSpeed) / baseSpeed;
        let highlightX = ballMesh.position.x + headT * baseVx * dirScale * 0.98;
        highlightX = Math.max(-12.8, Math.min(12.8, highlightX));
        const highlightZ = ballMesh.position.z + headT * baseVz * dirScale * 0.98;
        highlights[k].position.set(highlightX, ballMesh.position.y + 0.08, highlightZ);
        highlights[k].scale.setScalar(1.35);
    }
    lightProgress += 0.004;
}

function createAimHighlights() {
    highlights = [];
    for (let i = 0; i < 6; i++) {
        const h = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        scene.add(h);
        highlights.push(h);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now();
    let delta = (now - lastTime) / 1000 || 0.016;
    lastTime = now;
    if (delta > 0.1) delta = 0.1;
    accumulator += delta;

    while (accumulator >= FIXED_TIMESTEP) {
        if (gameOver) { accumulator -= FIXED_TIMESTEP; continue; }

        if (!isRolling && (bowlingCrewState === 'pulling' || bowlingCrewState === 'swinging')) {
            const controlFactor = currentBall.control / 15;
            hookPhase += 0.038 * (1 - controlFactor * PHYSICS.CONTROL_SWING_DAMPEN);
            const percent = (Math.sin(hookPhase) + 1) * 50;
            hookPointerEl.style.left = percent + '%';
        }

        if (isRolling) {
            const speed = ballVelocity.length();
            ballMesh.rotation.x -= speed * 0.095;
            ballMesh.rotation.z = -ballVelocity.x * 0.75;

            let hookFactor = 0;
            if (ballMesh.position.z < PHYSICS.HOOK_START_Z) hookFactor = Math.min(1.0, (PHYSICS.HOOK_START_Z - ballMesh.position.z) / 45);
            ballVelocity.x += spinAtRelease * FIXED_TIMESTEP * 2.8 * hookFactor;

            ballVelocity.multiplyScalar(PHYSICS.FRICTION_BASE);

            ballMesh.position.add(ballVelocity.clone().multiplyScalar(FIXED_TIMESTEP * 24));

            if (!inGutter && Math.abs(ballMesh.position.x) > 12.5) inGutter = true;

            if (inGutter) {
                const targetGutterX = ballMesh.position.x > 0 ? 15.75 : -15.75;
                ballMesh.position.x = ballMesh.position.x * 0.85 + targetGutterX * 0.15;
                ballMesh.position.y = Math.max(GUTTER_BALL_Y + 3.8, ballMesh.position.y - 0.25);
                ballVelocity.z *= 0.9985;
                ballVelocity.x *= 0.15;
            } else {
                ballMesh.position.y = LANE_TOP_Y;
            }

            if (!goingToCollector && (hasHitPins || ballVelocity.length() < PHYSICS.MIN_VELOCITY || ballMesh.position.z < (inGutter ? GUTTER_END_Z - 60 : LANE_END_Z + 35))) {
                goingToCollector = true;
                ballVelocity.z = -Math.abs(ballVelocity.z) * 0.48;
            }

            if (goingToCollector) {
                ballVelocity.z *= 1.0;
                if (ballMesh.position.z < COLLECTOR_Z - 5) {
                    ballMesh.position.y = Math.max(-8.8, ballMesh.position.y - 2.8);
                    ballVelocity.set(0, 0, 0);
                    if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 800);
                }
            }

            if (ballMesh.position.z < -235 - laneExtension) {
                ballMesh.position.y = Math.max(GUTTER_BALL_Y, ballMesh.position.y - 0.35);
                if (!inGutter) { ballVelocity.z *= 0.79; ballVelocity.x *= 0.62; } else { ballVelocity.z *= 0.985; }
            }

            if (ballVelocity.length() < 0.004) ballVelocity.set(0,0,0);

            checkBallPinCollisions();
            updatePins(FIXED_TIMESTEP);
            for (let i = 0; i < PIN_COLLISION_SUBSTEPS; i++) checkPinPinCollisions();

            const endZ = inGutter ? GUTTER_END_Z : LANE_END_Z;
            if (!hasHitPins && (ballVelocity.length() < PHYSICS.MIN_VELOCITY || ballMesh.position.z < endZ)) {
                if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 1800);
            }
        }
        accumulator -= FIXED_TIMESTEP;
    }

    updateBallPositionDebug();

    if (!isRolling && !gameOver) {
        updateAimLine();
        if (!fullView) { camera.position.set(0, 26, 85); camera.lookAt(0, 14, 20); }
        else { camera.position.set(0, 140, 220); camera.lookAt(0, 0, -80); }
        if (keys['ArrowLeft']) aimAngle -= 0.012;
        if (keys['ArrowRight']) aimAngle += 0.012;
        aimAngle = Math.max(-0.7, Math.min(0.7, aimAngle));
    }

    if (isRolling && ballMesh.position.z < -140) {
        camera.position.x = camera.position.x * 0.85 + ballMesh.position.x * 0.15;
        camera.position.y = 12;
        camera.position.z = camera.position.z * 0.88 + (-152 - laneExtension / 2) * 0.12;
        camera.lookAt(0, 2, -205 - laneExtension);
        if (ballMesh.position.y > 1.2) ballMesh.position.y = 1.2;
    } else if (isRolling) {
        const targetCameraZ = ballMesh.position.z + 62;
        camera.position.z = camera.position.z * 0.82 + targetCameraZ * 0.18;
        camera.position.y = 36;
        camera.position.x = ballMesh.position.x * 0.3;
        camera.lookAt(ballMesh.position.x * 0.3, 14, ballMesh.position.z - 55);
    }

    renderer.render(scene, camera);
}

function startDrag(e) {
    if (turnLostMessageActive || isRolling || gameOver || !timerHasStarted) return;
    isDragging = true;
    isTouchInput = !!(e.touches && e.touches.length > 0);
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartMouse.set(clientX, clientY);
    dragStartBallPos.copy(ballMesh.position);
    pullStartZ = ballMesh.position.z;
    swipeStartY = clientY;
    bowlingCrewState = 'positioning';
    lockedX = ballMesh.position.x;
}

function moveDrag(e) {
    if (turnLostMessageActive || !isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const deltaX = (clientX - dragStartMouse.x) * AIM_POSITION_SENSITIVITY;
    const deltaZ = (clientY - dragStartMouse.y) * 0.11;

    if (bowlingCrewState === 'positioning') {
        ballMesh.position.x = dragStartBallPos.x + deltaX;
        ballMesh.position.x = Math.max(-11.5, Math.min(11.5, ballMesh.position.x));
        lockedX = ballMesh.position.x;
    } else {
        ballMesh.position.x = lockedX;
    }

    ballMesh.position.z = dragStartBallPos.z + deltaZ;
    ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z));

    if (ballMesh.position.z > pullStartZ + 3 && bowlingCrewState === 'positioning') {
        bowlingCrewState = 'pulling';
        hookControllerEl.style.display = 'block';
        hookPhase = 0;
    }
}

function endDrag(e) {
    if (turnLostMessageActive || !isDragging) return;
    isDragging = false;

    if (bowlingCrewState === 'pulling' || bowlingCrewState === 'swinging') {
        launchBall();
    } else {
        bowlingCrewState = 'positioning';
        hookControllerEl.style.display = 'none';
    }
}

dom.addEventListener('mousedown', startDrag);
dom.addEventListener('mousemove', moveDrag);
dom.addEventListener('mouseup', endDrag);
dom.addEventListener('mouseleave', () => { isDragging = false; });

dom.addEventListener('touchstart', startDrag, { passive: false });
dom.addEventListener('touchmove', moveDrag, { passive: false });
dom.addEventListener('touchend', endDrag);

window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key.toLowerCase() === 'r' && !isRolling && !gameOver) { ballMesh.position.set(0, LANE_TOP_Y, 23); }
    if (e.key.toLowerCase() === 'v') fullView = !fullView;
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('playAgain').addEventListener('click', newGame);
document.getElementById('startButton').addEventListener('click', () => {
    document.getElementById('startButton').style.display = 'none';
    startNewRoll();
});

document.getElementById('popupPlayAgain').addEventListener('click', newGame);

document.getElementById('closeBallPopup').addEventListener('click', hideBallPopup);

const selectBallBtn = document.createElement('div');
selectBallBtn.innerHTML = '🎳 SELECT BALL';
selectBallBtn.style.cssText = 'position:absolute; top:85px; right:20px; background:#5eff00; color:#000; font-size:18px; font-weight:900; padding:10px 24px; border-radius:50px; box-shadow:0 0 20px #5eff00; z-index:500; cursor:pointer; white-space:nowrap;';
document.body.appendChild(selectBallBtn);
selectBallBtn.addEventListener('click', showBallPopup);

const aimSlider = document.getElementById('aimSlider');
const aimValue = document.getElementById('aimValue');
aimSlider.addEventListener('input', () => {
    AIM_POSITION_SENSITIVITY = parseFloat(aimSlider.value);
    aimValue.textContent = AIM_POSITION_SENSITIVITY.toFixed(3);
});

createAimHighlights();
createBallMesh();
updateCoinDisplay();

animate();

window.addEventListener('load', () => {
    resetPins();
    rollsInCurrentFrame = 0;
    currentFrame = 1;
    isFinalFrame = false;
    allRolls = [];
    frameRolls = [[], [], []];
    gameOver = false;
    document.getElementById('startButton').style.display = 'block';
    updateCoinDisplay();
});
</script>
