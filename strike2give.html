        .score { font-size:36px; font-weight:900; color:#5eff00; margin-top:6px; text-shadow:0 0 12px #5eff00; min-height:38px; line-height:1; }

        #timer {
            position:absolute; bottom:40px; left:40px;

        #hookController {

            border-radius:40px; z-index:300; overflow:hidden; box-shadow:0 0 30px #00ffcc; display:none;
        }
        #hookBar {
            position:relative; width:100%; height:100%;
            background: linear-gradient(to right,
                #ff2222 0%, #ff2222 20%,
                #aa44ff 20%, #aa44ff 40%,
                #3399ff 40%, #3399ff 60%,
                #5eff00 60%, #5eff00 80%,
                #ff2222 80%, #ff2222 100%);
        }
        .hookTick { position:absolute; top:4px; bottom:4px; width:3px; background:rgba(255,255,255,0.9); box-shadow:0 0 10px #ffffff; z-index:2; }
        #hookPointer {
            position:absolute; top:50%; transform:translate(-50%,-50%);
            width:42px; height:42px; background:#ffffff; border:5px solid #222; border-radius:50%;

        }

        #hookLeft { left:15px; } #hookStraight { left:50%; transform:translateX(-50%); } #hookRight { right:15px; }

        @keyframes sweepInFromRight {
            0% { transform: translateX(120%) rotate(12deg); opacity:0; }
            100% { transform: translateX(-50%) rotate(0deg); opacity:1; }
        }
        @keyframes flipOutToLeft {
            0% { transform: translateX(-50%) rotate(0deg); opacity:1; }
            100% { transform: translateX(-220%) rotate(-25deg); opacity:0; }
        }
        #scoreboardPanel.sweepIn { animation: sweepInFromRight 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        #scoreboardPanel.flipOut { animation: flipOutToLeft 0.7s cubic-bezier(0.4,0,1,1) forwards; }

        @keyframes popIn {
            0% { transform: scale(0.3); opacity:0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity:1; }
        }

        #splitPopup {

            display:none; position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
            background:#5eff00; color:#000; font-size:42px; padding:18px 60px; border-radius:50px;
            box-shadow:0 0 40px #ffcc00; z-index:400; cursor:pointer;
        }

        #testBanner {
            position:absolute; top:12px; left:50%; transform:translateX(-50%);

        #remainingPins {
            position:absolute; top:125px; right:20px; z-index:250;

            padding:12px 18px; box-shadow:0 0 22px #5eff00; display:none;
        }

        #foul {
            position:absolute; top:42%; left:50%; transform:translate(-50%, -50%);
            font-size:110px; font-weight:900; color:#ff2222; text-shadow:0 0 35px #ff0000, 0 0 70px #ff0000;
            z-index:300; opacity:0; pointer-events:none; transition:opacity 0.4s ease;
            white-space:nowrap;
        }

        #pinResult, #timeUp {
            position:absolute; top:38%; left:50%; transform:translate(-50%, -50%);
            font-size:78px; font-weight:900; 
            color:#5eff00; 
            text-shadow: none;
            z-index:310; opacity:0; pointer-events:none; white-space:nowrap; transition:all 0.4s ease;
        }

        #gameOverPopup {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            background:linear-gradient(#111827, #1e2937); border:8px solid #ff4444;
            border-radius:24px; padding:40px 50px; box-shadow:0 0 80px #ff0000, 0 0 40px #000;
            z-index:600; display:none; text-align:center; color:#fff; max-width:460px; width:92%;
            animation: popupPop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #gameOverPopup h1 {
            font-size:68px; color:#ff4444; margin:0 0 15px 0; text-shadow:0 0 25px #ff0000;
        }
        .popupScore {
            font-size:32px; margin:20px 0 8px; color:#5eff00;
        }
        #finalScoreBig {
            font-size:82px; font-weight:900; color:#5eff00; text-shadow:0 0 20px #5eff00;
            margin-bottom:30px;
        }
        .popupCoins {
            font-size:26px; margin:15px 0; color:#ffcc00;
        }
        #popupPlayAgain {
            background:#5eff00; color:#000; font-size:42px; font-weight:900;
            padding:18px 70px; border-radius:60px; margin-top:30px; cursor:pointer;
            box-shadow:0 0 40px #ffcc00; display:inline-block;
        }

        @keyframes popupPop {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity:0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
        }

        #readySetFly {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            font-size:110px;
            font-weight:900;
            color:#5eff00;
            text-shadow: none;
            z-index:999;
            white-space:nowrap;
            opacity:0;
            display:none;
            pointer-events:none;
            transition:none;
        }
        #readySetFly.show { animation: flyAcross 3.4s ease-in-out forwards; }
        @keyframes flyAcross {
            0%   { transform:translate(-50%, -50%) scale(0.8); opacity:0; }
            12%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            32%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            36%  { transform:translate(-50%, -50%) scale(0.9); opacity:0; }
            40%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            60%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            64%  { transform:translate(-50%, -50%) scale(0.9); opacity:0; }
            68%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            88%  { transform:translate(-50%, -50%) scale(1.1); opacity:1; }
            100% { transform:translate(-50%, -50%) scale(0.8); opacity:0; }
        }
    </style>

<script>
console.log("%c✅ PHASE 3 FIX 183 — Full code delivered (simple full-screen - no scaling wrapper)", "color:#00ffcc;font-size:18px;font-weight:bold");

const laneWidth = 26;
const gutterChannelWidth = 7;
const gutterDepth = 8;
const gutterOffset = 1;
const COLLECTOR_EXTRA_WIDTH = 15.5;
const PIN_HEIGHT_SCALE = 1.05;
const PIN_WIDTH_SCALE = 0.6;
const PIN_LAY_HEIGHT = 0.75;

let balls = [
    {name: "Basic Hammer", color: 0x222222, control: 8},
    {name: "Strike Master", color: 0x000000, control: 10},
    {name: "Power Hook", color: 0x660000, control: 7}
];
let currentBall = balls[0];
let currentBallIndex = 0;
let gCoins = 1250;
let g2gCoins = 45;

let allRolls = [];
let frameRolls = [[], [], []];
let currentFrame = 1;
const MAX_FRAMES = 3;
let rollsInCurrentFrame = 0;
let pinsStandingAtStartOfRoll = 10;
let gameOver = false;
let isFinalFrame = false;

const strikeMessages = ["STRIKE 🔥", "BOOM 💥", "FIRE 🚀", "LEGEND 💪"];
const spareMessages = ["SPARE 🔥", "CLEAN 💪"];
const missMessages = ["MISS 😞", "CLOSE ⚠️"];
const gutterMessage = "GUTTER 😟";

const MIN_PULL_Z = 25.08;
const MAX_PULL_Z = 40;
const laneExtension = 85;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 4000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

scene.fog = new THREE.Fog(0x0f172a, 80, 420);
scene.add(new THREE.AmbientLight(0xdddddd, 0.7));
const hemiLight = new THREE.HemisphereLight(0xaaaaaa, 0x444444, 0.9);
hemiLight.position.set(0, 50, 0);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
dirLight.position.set(30, 80, 60);
scene.add(dirLight);

const seamZ = 20;
const foulDetectionZ = 19.30;
const ballRadiusBase = 2.05;
const LANE_TOP_Y = 0.5;

const lighterWood = 0x8B5A2B;
const darkerWood = 0x6B3E2A;
const numPlanks = 15;
const plankWidth = laneWidth / numPlanks;

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.2, 300 + laneExtension), new THREE.MeshLambertMaterial({ color }));
    const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.5, -80 - laneExtension / 2);
    scene.add(plank);
}

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 25), new THREE.MeshLambertMaterial({ color }));
    const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.45, seamZ + 12.5); scene.add(plank);
}

for (let i = 0; i < numPlanks; i++) {
    const color = (i % 2 === 0) ? lighterWood : darkerWood;
    const plank = new THREE.Mesh(new THREE.BoxGeometry(plankWidth, 2.25, 30), new THREE.MeshLambertMaterial({ color }));
    const x = -laneWidth / 2 + (i + 0.5) * plankWidth;
    plank.position.set(x, -2.45, seamZ + 37.5); scene.add(plank);
}

const foulLine = new THREE.Mesh(new THREE.BoxGeometry(laneWidth + 2, .25, .15), new THREE.MeshLambertMaterial({ color: 0xFF0000 }));
foulLine.position.set(0, 0.12, seamZ - 9.5); scene.add(foulLine);

const pinPositions = [
    [0, -198 - laneExtension],
    [-3.85, -204 - laneExtension], [3.85, -204 - laneExtension],
    [-7.7, -210 - laneExtension], [0, -210 - laneExtension], [7.7, -210 - laneExtension],
    [-11.55, -216 - laneExtension], [-3.85, -216 - laneExtension], [3.85, -216 - laneExtension], [11.55, -216 - laneExtension]
];

const pinDotMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
pinPositions.forEach(pos => {
    const dot = new THREE.Mesh(new THREE.CircleGeometry(0.45, 16), pinDotMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(pos[0], 0.32, pos[1]);
    scene.add(dot);
});

const dotMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const darkPlankIndices = [2, 3.9, 5.8, 9.5, 11.4, 13.3];
darkPlankIndices.forEach(i => {
    const leftX = -laneWidth / 2 + i * plankWidth + .35;
    const rightX = -laneWidth / 2 + i * plankWidth - .95;
    const leftDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
    leftDot.rotation.x = -Math.PI / 2; leftDot.position.set(leftX, 0.3, 12); scene.add(leftDot);
    const rightDot = new THREE.Mesh(new THREE.CircleGeometry(0.32, 12), dotMat);
    rightDot.rotation.x = -Math.PI / 2; rightDot.position.set(rightX, 0.3, 12); scene.add(rightDot);
});

const approachPlankIndices = [1.85,3.80,5.75,7.7,9.65,11.55,13.3];
const approachDotZ = seamZ + 4;
approachPlankIndices.forEach(i => {
    const centerX = -laneWidth / 2. + (i-.1) * plankWidth;
    const radius = (i === 10) ? 0.50 : 0.32;
    const dot = new THREE.Mesh(new THREE.CircleGeometry(radius, 25), dotMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(centerX, 0.1, approachDotZ); scene.add(dot);
});

const arrowMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
function createArrow(x, z) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, -1.35,-3.2,0, 1.35,-3.2,0]), 3));
    const arrow = new THREE.Mesh(geo, arrowMat);
    arrow.position.set(x, 0.48, z);
    arrow.rotation.x = -Math.PI / 2;
    scene.add(arrow);
}
const darkCenters = [1.75, 3.5, 5.5, 7.25, 9.15, 11, 12.9].map(i => -laneWidth / 2 + (i + .25) * plankWidth);
createArrow(darkCenters[3], -110);
createArrow(darkCenters[2], -100);
createArrow(darkCenters[4], -100);
createArrow(darkCenters[1], -90);
createArrow(darkCenters[5], -90);
createArrow(darkCenters[0], -80);
createArrow(darkCenters[6], -80);

let pins = [];
function createPin(x, z, index) {
    const h = PIN_HEIGHT_SCALE;
    const w = PIN_WIDTH_SCALE;
    const group = new THREE.Group();
    const lowerBody = new THREE.Mesh(new THREE.CylinderGeometry(1.38 * w, 1.62 * w, 3.1 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    lowerBody.position.y = 2.05 * h; group.add(lowerBody);
    const upperBody = new THREE.Mesh(new THREE.CylinderGeometry(1.62 * w, 0.78 * w, 2.4 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    upperBody.position.y = 4.55 * h; group.add(upperBody);
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(1.65 * w, 1.65 * w, 0.48 * h, 48), new THREE.MeshPhongMaterial({ color: 0xFF0000, shininess: 20, emissive: 0x440000, emissiveIntensity: 0.3 }));
    stripe.position.y = 3.55 * h; group.add(stripe);
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.48 * w, 0.78 * w, 1.15 * h, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 25, emissive: 0x222222, emissiveIntensity: 0.18 }));
    neck.position.y = 6.35 * h; group.add(neck);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.68 * w, 48, 48), new THREE.MeshPhongMaterial({ color: 0xF8F8F8, shininess: 30, emissive: 0x222222, emissiveIntensity: 0.18 }));
    head.position.y = 7.35 * h; group.add(head);
    group.position.set(x, -1.85 * h, z);
    scene.add(group);
    group.traverse((child) => { if (child.isMesh) { child.castShadow = false; child.receiveShadow = false; } });
    const pinData = { 
        group, 
        velocity: new THREE.Vector3(), 
        angularVelocity: new THREE.Vector3(), 
        isStanding: true, 
        radius: 1.48 * w, 
        originalPosition: new THREE.Vector3(x, -1.85 * h, z),
        index: index
    };
    pins.push(pinData);
    return group;
}
pinPositions.forEach((pos, i) => createPin(pos[0], pos[1], i));

const enclosureMat = new THREE.MeshPhongMaterial({ color: 0x1a2533, shininess: 15, side: THREE.DoubleSide });

const fullGutterWidth = laneWidth + 2 * (gutterChannelWidth + gutterOffset + 2);

const pinCeiling = new THREE.Mesh(new THREE.BoxGeometry(fullGutterWidth, 3, 70), enclosureMat);
pinCeiling.position.set(0, 16, -235 - laneExtension); scene.add(pinCeiling);

const pinLeftWall = new THREE.Mesh(new THREE.BoxGeometry(2, 22, 70), enclosureMat);
pinLeftWall.position.set(-(laneWidth/2.5 + gutterChannelWidth + gutterOffset + 1), 6, -235 - laneExtension); scene.add(pinLeftWall);

const pinRightWall = new THREE.Mesh(new THREE.BoxGeometry(2, 22, 70), enclosureMat);
pinRightWall.position.set(+(laneWidth/2.5 + gutterChannelWidth + gutterOffset + 1), 6, -235 - laneExtension); scene.add(pinRightWall);

const pinBackWall = new THREE.Mesh(new THREE.BoxGeometry(fullGutterWidth, 21, 2), enclosureMat);
pinBackWall.position.set(0, 6, -278 - laneExtension); scene.add(pinBackWall);

const collectorMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
const LANE_END_Z = -225 - laneExtension;
const COLLECTOR_Z = LANE_END_Z;
const collectorFloor = new THREE.Mesh(new THREE.BoxGeometry(laneWidth + COLLECTOR_EXTRA_WIDTH, 2, 120), collectorMat);

function getCurrentScore() {
    let score = 0; let rollIndex = 0;
    for (let frame = 0; frame < MAX_FRAMES; frame++) {
        if (rollIndex >= allRolls.length) break;
        const roll1 = allRolls[rollIndex];
        if (roll1 === 10) {
            score += 10;
            if (rollIndex + 1 < allRolls.length) score += allRolls[rollIndex + 1];
            if (rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 1;
        } else {
            const roll2 = allRolls[rollIndex + 1] || 0;
            const sum = roll1 + roll2;
            score += sum;
            if (sum === 10 && rollIndex + 2 < allRolls.length) score += allRolls[rollIndex + 2];
            rollIndex += 2;
        }
    }
    return score;
}

        if (frameData.length > 0) {

            }

        if (isComplete) {

                const roll1 = frameData[0];
                if (roll1 === 10) {

                    const idx = allRolls.indexOf(roll1);
                    if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    if (idx + 2 < allRolls.length) frameScore += allRolls[idx + 2] || 0;
                } else {
                    const roll2 = frameData[1] || 0;
                    frameScore = roll1 + roll2;
                    if (roll1 + roll2 === 10) {
                        const idx = allRolls.indexOf(roll2);
                        if (idx + 1 < allRolls.length) frameScore += allRolls[idx + 1] || 0;
                    }

            }

function isSplit(knockedThisRoll) {

    const indices = standing.map(p => p.index).sort((a,b)=>a-b);
    return (indices[0] === 6 && indices[1] === 9) || (indices[0] === 3 && indices[1] === 8) || (indices[0] === 4 && indices[1] === 7);
}

function finishRoll(knockedThisRoll) {
    allRolls.push(knockedThisRoll);
    frameRolls[currentFrame-1].push(knockedThisRoll);
    rollsInCurrentFrame = frameRolls[currentFrame-1].length;

    if (rollsInCurrentFrame === 1 && isSplit(knockedThisRoll)) showSplitPopup();

    let resultText = "";
    let color = "#ffcc00";
    let indicatorMessage = "";

    if (knockedThisRoll === 10 && rollsInCurrentFrame === 1) resultText = getRandom(strikeMessages);
    else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll === 10)) resultText = getRandom(spareMessages);
    else if (rollsInCurrentFrame === 2 && (frameRolls[currentFrame-1][0] + knockedThisRoll < 10)) resultText = getRandom(missMessages);
    else if (knockedThisRoll === 0) { 
        if (!timedOut) {
            resultText = gutterMessage; 
            color = "#ff8800"; 
            indicatorMessage = gutterMessage; 
        }
    }
    else resultText = getRandom(missMessages);

    if (resultText) showResult(resultText, color);

    if (rollsInCurrentFrame === 1 && knockedThisRoll < 10) {
        clearFallenPins();
        updateRemainingPinsVisual(indicatorMessage);
    } else hideRemainingPinsVisual();

    updateScoreboard();

    if (isFinalFrame) {
        const first = frameRolls[2][0] || 0;
        const second = frameRolls[2][1] || 0;
        if (rollsInCurrentFrame === 1 && knockedThisRoll === 10) resetPins();
        else if (rollsInCurrentFrame === 2) {
            if (first === 10) {
                if (second === 10) resetPins();
            } else if (first + second === 10) {
                resetPins();
            }
        }
    }

    let advance = false;

    if (!isFinalFrame) {
        if (rollsInCurrentFrame >= 2 || knockedThisRoll === 10) {
            advance = true;
        }
    } else {
        if (rollsInCurrentFrame >= 3) advance = true;
        else if (rollsInCurrentFrame === 2) {
            const first = frameRolls[2][0] || 0;
            const second = frameRolls[2][1] || 0;
            if (!(first === 10 || first + second === 10)) advance = true;
        }
    }

    if (advance) {
        advanceToNextFrame();
    } else {
        startNewRoll();
    }
}

}

function checkBallPinCollisions() {
    if (!isRolling || ballVelocity.length() < 0.3 || ballMesh.position.z > -175) return;
    const bPos = ballMesh.position;
    const speed = ballVelocity.length();
    for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        if (!pin.isStanding) continue;
        const pPos = pin.group.position;
        const dx = bPos.x - pPos.x;
        const dz = bPos.z - pPos.z;
        const distSq = dx*dx + dz*dz;
        const minDistSq = Math.pow(ballRadiusBase + pin.radius, 2);
        if (distSq < minDistSq) {
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist;
            const nz = dz / dist;
            const overlap = (ballRadiusBase + pin.radius) - dist + 0.18;
            pPos.x += nx * overlap * 0.85;
            pPos.z += nz * overlap * 0.85;
            const impulse = Math.max(12.5, speed * 2.15);
            const lift = 7.2 + speed * 1.15;
            const spinFactor = 8.8 + speed * 0.95;
            const glancing = Math.abs(nx);
            pin.velocity.set(nx * impulse * 1.32, lift, nz * impulse * 1.28);
            pin.angularVelocity.set(nz * spinFactor * 0.78 * glancing, 0, -nx * spinFactor * 1.25);
            pin.isStanding = false;
            ballVelocity.multiplyScalar(0.53);
            if (!hasHitPins) {
                hasHitPins = true;
                if (endRollTimeout) clearTimeout(endRollTimeout);
                endRollTimeout = setTimeout(endCurrentRoll, 4800);
            }
            return;
        }
    }
}

function checkPinPinCollisions() {
    const sortedPins = [...pins].sort((a, b) => a.index - b.index);
    for (let i = 0; i < sortedPins.length; i++) {
        for (let j = i + 1; j < sortedPins.length; j++) {
            const p1 = sortedPins[i];
            const p2 = sortedPins[j];
            if (!p1.isStanding && !p2.isStanding) continue;
            const dx = p1.group.position.x - p2.group.position.x;
            const dz = p1.group.position.z - p2.group.position.z;
            const distSq = dx*dx + dz*dz;
            const minDistSq = Math.pow(p1.radius + p2.radius, 2);
            if (distSq >= minDistSq) continue;
            const dist = Math.sqrt(distSq) || 0.01;
            const nx = dx / dist; 
            const nz = dz / dist;
            const v1x = p1.velocity.x; 
            const v1z = p1.velocity.z;
            const v2x = p2.velocity.x; 
            const v2z = p2.velocity.z;
            const dot = (v1x - v2x) * nx + (v1z - v2z) * nz;
            if (dot > 0) continue;
            const impulse = -dot * 2.75;
            const lift = 5.4 + Math.abs(dot) * 1.25;
            p1.velocity.x += nx * impulse * 1.02; 
            p1.velocity.z += nz * impulse * 1.02;
            p2.velocity.x -= nx * impulse * 1.02; 
            p2.velocity.z -= nz * impulse * 1.02;
            p1.velocity.y += lift; 
            p2.velocity.y += lift;
            p1.angularVelocity.set(nz * 14.5, 0, -nx * 14.5);
            p2.angularVelocity.set(-nz * 14.5, 0, nx * 14.5);
            if (p1.isStanding) p1.isStanding = false;
            if (p2.isStanding) p2.isStanding = false;
            const overlap = (p1.radius + p2.radius) - dist + 0.14;
            p1.group.position.x += nx * overlap * 0.72; 
            p1.group.position.z += nz * overlap * 0.72;
            p2.group.position.x -= nx * overlap * 0.72; 
            p2.group.position.z -= nz * overlap * 0.72;
        }
    }
}

function updatePins(delta) {
    for (let pin of pins) {
        if (!pin.isStanding) {
            pin.velocity.y -= 48 * delta;
            pin.group.position.addScaledVector(pin.velocity, delta * 32);
            pin.group.rotation.x += pin.angularVelocity.x * delta * 14;
            pin.group.rotation.z += pin.angularVelocity.z * delta * 14;

            if (Math.abs(pin.velocity.x) < 0.012 && Math.abs(pin.velocity.z) < 0.012 && Math.abs(pin.velocity.y) < 0.4) {
                pin.velocity.set(0, 0, 0);
                pin.angularVelocity.set(0, 0, 0);
            }

            const maxTip = Math.PI / 2;
            if (Math.abs(pin.velocity.x) < 0.08 && Math.abs(pin.velocity.z) < 0.08) {
                if (pin.group.rotation.x > maxTip) pin.group.rotation.x = maxTip;
                if (pin.group.rotation.x < -maxTip) pin.group.rotation.x = -maxTip;
                if (pin.group.rotation.z > maxTip) pin.group.rotation.z = maxTip;
                if (pin.group.rotation.z < -maxTip) pin.group.rotation.z = -maxTip;
            }

            pin.velocity.multiplyScalar(0.932);
            pin.angularVelocity.multiplyScalar(0.885);

            if (pin.group.position.y < PIN_LAY_HEIGHT) {
                pin.group.position.y = PIN_LAY_HEIGHT;
                pin.velocity.y = Math.abs(pin.velocity.y) * 0.62;
                pin.velocity.x *= 0.73;
                pin.velocity.z *= 0.73;
            }

            if (pin.group.position.x < -13) { pin.group.position.x = -13; pin.velocity.x = Math.abs(pin.velocity.x) * 0.55; }
            if (pin.group.position.x > 13) { pin.group.position.x = 13; pin.velocity.x = -Math.abs(pin.velocity.x) * 0.55; }
            if (pin.group.position.z < -230 - laneExtension) { pin.group.position.z = -230 - laneExtension; pin.velocity.z = Math.abs(pin.velocity.z) * 0.55; }
            if (pin.group.position.z > -195 - laneExtension) { pin.group.position.z = -195 - laneExtension; pin.velocity.z = -Math.abs(pin.velocity.z) * 0.55; }
        }
    }
}

function updateAimLine() {
    if (mainAimBar) mainAimBar.visible = true;
    highlights.forEach(h => { if (h) h.visible = true; });
    const pullDistance = Math.max(0, ballMesh.position.z - 23);
    const power = 3.4 + pullDistance * 0.1;
    const baseVx = ballMesh.position.x * 0.0085 + Math.sin(aimAngle) * 3.8;
    const baseVz = -power;
    const projectionDistance = 100;
    const steps = 65;
    const points = [];
    const dirScale = projectionDistance / Math.abs(baseVz);
    for (let i = 0; i < steps; i++) {
        const t = i / (steps - 1);
        let x = ballMesh.position.x + t * baseVx * dirScale;
        x = Math.max(-12.8, Math.min(12.8, x));
        const z = ballMesh.position.z + t * baseVz * dirScale;
        points.push(new THREE.Vector3(x, ballMesh.position.y + 0.02, z));
    }
    if (mainAimBar) scene.remove(mainAimBar);
    const curve = new THREE.CatmullRomCurve3(points);
    const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.85, 8, false);
    mainAimBar = new THREE.Mesh(tubeGeo, aimBarMaterial);
    scene.add(mainAimBar);
    const baseSpeed = 1.6;
    for (let k = 0; k < highlights.length; k++) {
        const offset = k * 0.16;
        const headT = ((lightProgress + offset) % baseSpeed) / baseSpeed;
        let highlightX = ballMesh.position.x + headT * baseVx * dirScale * 0.98;
        highlightX = Math.max(-12.8, Math.min(12.8, highlightX));
        const highlightZ = ballMesh.position.z + headT * baseVz * dirScale * 0.98;
        highlights[k].position.set(highlightX, ballMesh.position.y + 0.08, highlightZ);
        highlights[k].scale.setScalar(1.35);
    }
    lightProgress += 0.007;
}

function createAimHighlights() {
    highlights = [];
    for (let i = 0; i < 6; i++) {
        const h = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        scene.add(h);
        highlights.push(h);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now();
    let delta = (now - lastTime) / 1000 || 0.016;
    lastTime = now;
    if (delta > 0.1) delta = 0.1;
    accumulator += delta;

    while (accumulator >= FIXED_TIMESTEP) {
        if (gameOver) { accumulator -= FIXED_TIMESTEP; continue; }

        if (!isRolling && (bowlingCrewState === 'pulling' || bowlingCrewState === 'swinging')) {
            hookPhase += 0.065;
            const percent = (Math.sin(hookPhase) + 1) * 50;
            hookPointerEl.style.left = percent + '%';
        }

        if (isRolling) {
            const speed = ballVelocity.length();
            ballMesh.rotation.x -= speed * 0.095;
            ballMesh.rotation.z = -ballVelocity.x * 0.75;

            let hookFactor = 0;
            if (ballMesh.position.z < HOOK_START_Z) hookFactor = Math.min(1.0, (HOOK_START_Z - ballMesh.position.z) / 45);
            ballVelocity.x += spinAtRelease * FIXED_TIMESTEP * 2.8 * hookFactor;

            ballVelocity.multiplyScalar(FRICTION_BASE);

            ballMesh.position.add(ballVelocity.clone().multiplyScalar(FIXED_TIMESTEP * 24));

            if (!inGutter && Math.abs(ballMesh.position.x) > 12.5) inGutter = true;

            if (inGutter) {
                const targetGutterX = ballMesh.position.x > 0 ? 15.75 : -15.75;
                ballMesh.position.x = ballMesh.position.x * 0.85 + targetGutterX * 0.15;
                ballMesh.position.y = Math.max(GUTTER_BALL_Y + 3.8, ballMesh.position.y - 0.25);
                ballVelocity.z *= 0.9985;
                ballVelocity.x *= 0.15;
            } else {
                ballMesh.position.y = LANE_TOP_Y;
            }

            if (!goingToCollector && (hasHitPins || ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < (inGutter ? GUTTER_END_Z - 60 : LANE_END_Z + 35))) {
                goingToCollector = true;
                ballVelocity.z = -Math.abs(ballVelocity.z) * 0.48;
            }

            if (goingToCollector) {
                ballVelocity.z *= 1.0;
                if (ballMesh.position.z < COLLECTOR_Z - 5) {
                    ballMesh.position.y = Math.max(-8.8, ballMesh.position.y - 2.8);
                    ballVelocity.set(0, 0, 0);
                    if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 800);
                }
            }

            if (ballMesh.position.z < -235 - laneExtension) {
                ballMesh.position.y = Math.max(GUTTER_BALL_Y, ballMesh.position.y - 0.35);
                if (!inGutter) { ballVelocity.z *= 0.79; ballVelocity.x *= 0.62; } else { ballVelocity.z *= 0.985; }
            }

            if (ballVelocity.length() < 0.004) ballVelocity.set(0,0,0);

            checkBallPinCollisions();
            updatePins(FIXED_TIMESTEP);
            for (let i = 0; i < PIN_COLLISION_SUBSTEPS; i++) checkPinPinCollisions();

            const endZ = inGutter ? GUTTER_END_Z : LANE_END_Z;
            if (!hasHitPins && (ballVelocity.length() < MIN_VELOCITY || ballMesh.position.z < endZ)) {
                if (endRollTimeout === null) endRollTimeout = setTimeout(endCurrentRoll, 1800);
            }
        }
        accumulator -= FIXED_TIMESTEP;
    }

    if (!isRolling && !gameOver) {
        updateAimLine();
        if (!fullView) { camera.position.set(0, 26, 85); camera.lookAt(0, 14, 20); }
        else { camera.position.set(0, 140, 220); camera.lookAt(0, 0, -80); }
        if (keys['ArrowLeft']) aimAngle -= 0.012;
        if (keys['ArrowRight']) aimAngle += 0.012;
        aimAngle = Math.max(-0.7, Math.min(0.7, aimAngle));
    }

    if (isRolling && ballMesh.position.z < -140) {
        camera.position.x = camera.position.x * 0.85 + ballMesh.position.x * 0.15;
        camera.position.y = 12;
        camera.position.z = camera.position.z * 0.88 + (-152 - laneExtension / 2) * 0.12;
        camera.lookAt(0, 2, -205 - laneExtension);
        if (ballMesh.position.y > 1.2) ballMesh.position.y = 1.2;
    } else if (isRolling) {
        const targetCameraZ = ballMesh.position.z + 62;
        camera.position.z = camera.position.z * 0.82 + targetCameraZ * 0.18;
        camera.position.y = 36;
        camera.position.x = ballMesh.position.x * 0.3;
        camera.lookAt(ballMesh.position.x * 0.3, 14, ballMesh.position.z - 55);
    }

    renderer.render(scene, camera);
}

function startDrag(e) {
    if (turnLostMessageActive || isRolling || gameOver || !timerHasStarted) return;
    isDragging = true;
    isTouchInput = !!(e.touches && e.touches.length > 0);
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartMouse.set(clientX, clientY);
    dragStartBallPos.copy(ballMesh.position);
    pullStartZ = ballMesh.position.z;
    swipeStartY = clientY;
    bowlingCrewState = 'positioning';
    lockedX = ballMesh.position.x;
}

function moveDrag(e) {
    if (turnLostMessageActive || !isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const deltaX = (clientX - dragStartMouse.x) * 0.18;
    const deltaZ = (clientY - dragStartMouse.y) * 0.11;

    if (bowlingCrewState === 'positioning') {
        ballMesh.position.x = dragStartBallPos.x + deltaX;
        ballMesh.position.x = Math.max(-11.5, Math.min(11.5, ballMesh.position.x));
        lockedX = ballMesh.position.x;
    } else {
        ballMesh.position.x = lockedX;
    }

    ballMesh.position.z = dragStartBallPos.z + deltaZ;
    ballMesh.position.z = Math.max(MIN_PULL_Z, Math.min(MAX_PULL_Z, ballMesh.position.z));

    if (ballMesh.position.z > pullStartZ + 3 && bowlingCrewState === 'positioning') {
        bowlingCrewState = 'pulling';
        hookControllerEl.style.display = 'block';
        hookPhase = 0;
    }
}

function endDrag(e) {
    if (turnLostMessageActive || !isDragging) return;
    isDragging = false;

    if (isTouchInput) {
        const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
        const swipeDeltaY = swipeStartY - clientY;
        if ((bowlingCrewState === 'pulling' || bowlingCrewState === 'swinging') && swipeDeltaY > 35) {
            launchBall();
        } else {
            bowlingCrewState = 'positioning';
            hookControllerEl.style.display = 'none';
        }
    } else {
        if (bowlingCrewState === 'pulling' || bowlingCrewState === 'swinging') {
            launchBall();
        } else {
            bowlingCrewState = 'positioning';
            hookControllerEl.style.display = 'none';
        }
    }
}

dom.addEventListener('mousedown', startDrag);
dom.addEventListener('mousemove', moveDrag);
dom.addEventListener('mouseup', endDrag);
dom.addEventListener('mouseleave', () => { isDragging = false; });

dom.addEventListener('touchstart', startDrag, { passive: false });
dom.addEventListener('touchmove', moveDrag, { passive: false });
dom.addEventListener('touchend', endDrag);

dom.addEventListener('click', handleBallSelection);
dom.addEventListener('touchend', handleBallSelection);

window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key.toLowerCase() === 'r' && !isRolling && !gameOver) resetBallAndTimer();
    if (e.key.toLowerCase() === 'v') fullView = !fullView;
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('playAgain').addEventListener('click', newGame);
document.getElementById('startButton').addEventListener('click', () => {
    document.getElementById('startButton').style.display = 'none';
    startNewRoll();
});

document.getElementById('popupPlayAgain').addEventListener('click', newGame);

createPreviewBalls();
createAimHighlights();
createBallMesh();
updateCoinDisplay();
updateSelectedBallVisual();

animate();

window.addEventListener('load', () => {
    resetPins();
    rollsInCurrentFrame = 0;
    currentFrame = 1;
    isFinalFrame = false;
    allRolls = [];
    frameRolls = [[], [], []];
    gameOver = false;
    document.getElementById('startButton').style.display = 'block';
    updateCoinDisplay();
});
</script>
</body>
</html>
