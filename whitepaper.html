<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grind2Give V2 White Paper – Gaming Grind → Real-World Good</title>
  <style>
    :root {
      --green: #00ffaa;
      --dark: #0f0f1a;
      --light: #e0e0ff;
      --glow: rgba(0, 255, 170, 0.5);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--light);
      line-height: 1.7;
      font-size: 1.05rem;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px 15px;
      background: rgba(26, 26, 46, 0.9);
      border-radius: 12px;
    }
    header {
      text-align: center;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(0, 255, 170, 0.2);
    }
    h1 {
      font-size: clamp(2.4rem, 7vw, 3.5rem);
      margin: 0 0 15px;
      color: var(--green);
    }
    .subtitle {
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: #aaa;
      margin: 8px 0;
    }
    h2 {
      color: var(--green);
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      margin: 50px 0 25px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      background: rgba(15, 15, 26, 0.8);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(0, 255, 170, 0.15);
      vertical-align: middle;
    }
    th {
      background: rgba(0, 255, 170, 0.1);
      color: var(--green);
      width: 38%;
    }
    /* Fix for long contract addresses */
    .contract {
      font-family: monospace;
      word-break: break-all;
      word-wrap: break-word;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .highlight { color: var(--green); font-weight: bold; }

    @media (max-width: 768px) {
      .container { margin: 15px 10px; padding: 20px 15px; }
      th, td { padding: 12px 10px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
