<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ... (all your meta, title, links, etc. remain unchanged) ... -->

  <style>
    :root {
      --green: #00ffaa;
      --dark: #0f0f1a;
      --light: #f0fff0;
      --gray: #1a1a2e;
      --glow: rgba(0, 255, 170, 0.55);   /* toned down glow strength */
      --twitch: #9146FF;
      --twitch-hover: #7c3aed;
      --twitch-glow: rgba(145, 70, 255, 0.85);
      --overlay: rgba(30, 30, 50, 0.25);
      --merch: #ffdd00;
    }

    /* ... (body, header, cta, section, h2, p, etc. all unchanged from previous version) ... */

    #countdown {
      font-size: 5.2rem;                  /* slightly smaller than before for better readability */
      font-weight: 900;
      color: #33ffcc;                     /* softer, more readable bright cyan-green */
      letter-spacing: 5px;
      padding: 45px 35px;
      margin: 20px auto;
      max-width: 90%;
      display: inline-block;
      background: rgba(0, 0, 0, 0.45);    /* semi-dark backing → huge readability boost */
      border-radius: 24px;
      border: 2px solid rgba(51, 255, 204, 0.4);
      box-shadow: 
        0 0 25px rgba(51, 255, 204, 0.5),
        0 0 50px rgba(51, 255, 204, 0.3);
      text-shadow: 
        0 0 15px rgba(51, 255, 204, 0.7),
        2px 2px 8px rgba(0,0,0,0.8);      /* subtle drop shadow for digit definition */
      animation: gentle-pulse 2.2s ease-in-out infinite alternate;
      backdrop-filter: blur(3px);
    }

    @keyframes gentle-pulse {
      from {
        transform: scale(1.00);
        box-shadow: 0 0 25px rgba(51, 255, 204, 0.5), 0 0 50px rgba(51, 255, 204, 0.3);
      }
      to {
        transform: scale(1.03);           /* very subtle breathing — not distracting */
        box-shadow: 0 0 40px rgba(51, 255, 204, 0.7), 0 0 70px rgba(51, 255, 204, 0.45);
      }
    }

    /* Make sure the wrapper doesn't fight the timer contrast */
    .countdown-wrapper {
      background: linear-gradient(135deg, rgba(0, 40, 20, 0.35), rgba(0, 80, 40, 0.25)), 
                  url('https://grind2give.org/fbcountdown.png') center / cover no-repeat;
      box-shadow: 0 0 80px rgba(0, 255, 170, 0.5);
      border: 2px solid rgba(0, 255, 170, 0.45);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }

    .countdown-wrapper::before {
      background: rgba(10, 30, 20, 0.42);   /* slightly darker than before to support timer contrast */
      backdrop-filter: blur(2px);
    }

    /* ... (all other styles: contest-wrapper, prize-card, footer, media queries, etc. remain unchanged) ... */

    @media (max-width: 768px) {
      #countdown {
        font-size: 3.6rem;
        padding: 35px 25px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>

<!-- ... (all your HTML content: header, sections, footer, script — exactly the same as before) ... -->

<script>
  const launchDate = new Date("2026-03-21T22:00:00-05:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = launchDate - now;

    if (distance < 0) {
      document.getElementById("countdown").innerHTML = "LIVE NOW! 🚀";
      return;
    }

    const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML = 
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
