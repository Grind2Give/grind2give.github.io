<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grind2Give V2 • Gaming with Purpose</title>
  <meta name="description" content="Grind2Give V2 is LIVE on Base — 100% LP locked for 3 years • Trade $G2G now on Uniswap!" />
  <meta name="theme-color" content="#00ffaa" />

  <link rel="preload" href="https://grind2give.org/newlogo.jpg" as="image">

  <style>
    :root {
      --green: #00ffaa;
      --glow: rgba(0, 255, 170, 0.65);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: #f0fff0;
      background: #000000;
      min-height: 100vh;
      position: relative;
      text-align: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle, var(--green) 0.8px, transparent 1px),
        radial-gradient(circle, var(--green) 0.6px, transparent 1px),
        radial-gradient(circle, var(--green) 1px, transparent 1.5px);
      background-size: 180px 180px, 250px 250px, 320px 320px;
      background-position: 0 0, 40px 60px, 80px 30px;
      opacity: 0.75;
      animation: sparkle 12s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%   { background-position: 0 0, 40px 60px, 80px 30px; }
      100% { background-position: 180px 180px, 290px 310px, 400px 250px; }
    }

    header {
      padding-top: 160px;
      min-height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .logo-top {
      max-width: 420px;
      width: 90%;
      margin-bottom: 25px;
      filter: drop-shadow(0 0 45px var(--glow));
    }

    .v2-badge {
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      color: #000;
      padding: 10px 32px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.75rem;
      margin-bottom: 15px;
      box-shadow: 0 0 40px var(--glow);
    }

    h1 {
      font-size: clamp(3.2rem, 9vw, 5.5rem);
      margin: 10px 0 20px;
      color: var(--green);
      text-shadow: 0 0 60px var(--glow);
    }

    .tagline {
      font-size: clamp(1.7rem, 5.5vw, 2.6rem);
      color: var(--green);
      text-shadow: 0 0 40px var(--glow);
      margin: 0 0 30px;
    }

    .verse {
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      color: #f8f8ff;
      font-style: italic;
      max-width: 880px;
      text-shadow: 0 0 50px black;
    }

    .buy-btn, .howto-btn {
      display: inline-block;
      background: linear-gradient(90deg, #00ffaa, #ffdd00);
      color: #000;
      padding: 26px 90px;
      font-size: 2.3rem;
      font-weight: bold;
      border-radius: 20px;
      text-decoration: none;
      margin: 25px 10px;
      box-shadow: 0 0 70px var(--glow);
      transition: all 0.4s ease;
    }

    .buy-btn:hover, .howto-btn:hover {
      transform: scale(1.09);
      box-shadow: 0 0 100px #ffdd00;
    }

    .whitepaper-btn {
      display: inline-block;
      background: rgba(0, 255, 170, 0.15);
      color: var(--green);
      border: 2px solid var(--green);
      padding: 18px 60px;
      font-size: 1.8rem;
      font-weight: bold;
      border-radius: 16px;
      text-decoration: none;
      margin: 20px 10px;
      transition: all 0.4s ease;
      box-shadow: 0 0 30px rgba(0,255,170,0.3);
    }

    .whitepaper-btn:hover {
      background: var(--green);
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 50px var(--glow);
    }

    section {
      max-width: 1200px;
      margin: 80px auto;
      padding: 50px 20px;
      background: rgba(15,15,26,0.75);
      border-radius: 16px;
      z-index: 2;
    }

    .contract-address {
      font-family: monospace;
      font-size: 1.35rem;
      color: var(--green);
      background: rgba(0,0,0,0.7);
      padding: 15px 25px;
      border-radius: 12px;
      display: inline-block;
      word-break: break-all;
    }
  </style>
</head>
<body>

<header>
  <img src="https://grind2give.org/newlogo.jpg" alt="Grind2Give Logo" class="logo-top">

  <div class="v2-badge">V2 IS LIVE 🚀</div>
  <h1>Grind2Give</h1>
  <p class="tagline">Gaming Grind → Real-World Good → Real-World Change 🗺️</p>
  <p class="verse">
